<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All-in-One Dashboard</title>
<style>
  :root{
    --primary:#FFCD3C; --primary-dark:#F5B700; --bg:#F6F6F8; --card:#FFFFFF;
    --ink:#1A1A1A; --muted:#8A8A8E; --line:#ECECEE; --green:#2E9E5B; --red:#D64545;
    --radius:16px; --radius-sm:10px; --shadow:0 2px 14px rgba(20,20,20,0.07);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);transition:background .2s ease,color .2s ease;}
  button,input,select,textarea{font-family:inherit;}
  a{color:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}

  /* ---------- TOPBAR ---------- */
  #topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 32px;background:var(--card);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:50;
  }
  .tb-left{display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:800;font-size:18px;}
  .tb-logo{width:34px;height:34px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:17px;}
  .tb-right{display:flex;gap:10px;}
  .tb-btn{background:none;border:1.5px solid var(--line);padding:9px 16px;border-radius:9px;font-weight:700;font-size:13.5px;color:var(--ink);}
  .tb-btn:hover{border-color:var(--primary-dark);}
  .tb-btn.admin-btn{background:var(--ink);color:var(--primary);border-color:var(--ink);}

  #app-root{padding:0;min-height:calc(100vh - 64px);}
  .view{display:none;}
  .view.active{display:block;}

  /* ---------- DASHBOARD ---------- */
  .dash-wrap{max-width:1000px;margin:0 auto;padding:60px 24px;text-align:center;}
  .dash-wrap h1{font-size:30px;font-weight:800;margin-bottom:6px;}
  .dash-wrap p.sub{color:var(--muted);margin-bottom:44px;font-size:15px;}
  .dash-cards{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;}
  .dash-card{
    width:300px;max-width:100%;padding:36px 28px;border-radius:20px;background:var(--card);box-shadow:var(--shadow);
    cursor:pointer;border:1.5px solid var(--line);transition:transform .15s ease, box-shadow .15s ease;text-align:left;
  }
  .dash-card:hover{transform:translateY(-4px);box-shadow:0 8px 26px rgba(20,20,20,0.12);border-color:var(--primary);}
  .dash-card .dc-ic{width:52px;height:52px;border-radius:14px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px;}
  .dash-card h2{margin:0 0 6px 0;font-size:19px;font-weight:800;}
  .dash-card p{margin:0;color:var(--muted);font-size:13.5px;line-height:1.5;}
  .dash-empty{max-width:520px;margin:60px auto;text-align:center;color:var(--muted);}

  .back-btn{background:none;border:none;color:var(--muted);font-weight:700;font-size:14px;padding:14px 28px 0 28px;cursor:pointer;}
  .back-btn:hover{color:var(--ink);}
  .sub-title-row{padding:6px 28px 26px 28px;}
  .sub-title-row h1{margin:0;font-size:24px;font-weight:800;}

  /* ---------- FINANCE SHELL (desktop) ---------- */
  .fin-shell{display:grid;grid-template-columns:220px 1fr;gap:0;padding:0 28px 40px 28px;max-width:1300px;margin:0 auto;}
  .fin-sidebar{padding-top:6px;}
  .fin-nav-btn{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
    padding:12px 14px;border-radius:10px;font-weight:700;font-size:14.5px;color:var(--muted);margin-bottom:4px;
  }
  .fin-nav-btn .ic{font-size:17px;}
  .fin-nav-btn:hover{background:var(--line);}
  .fin-nav-btn.active{background:var(--primary);color:var(--ink);}
  .fin-add-btn{
    width:100%;margin-top:14px;padding:13px 0;border-radius:10px;background:var(--ink);color:var(--primary);
    border:none;font-weight:800;font-size:14px;
  }
  .fin-add-btn:hover{opacity:0.9;}
  .fin-main{padding-left:26px;border-left:1px solid var(--line);min-height:70vh;}

  .fin-topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:22px;}
  .month-nav{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;}
  .month-nav button{background:var(--card);border:1.5px solid var(--line);width:32px;height:32px;border-radius:50%;font-size:15px;}
  .stat-pill-row{display:flex;gap:10px;}
  .stat-pill{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:10px 18px;text-align:center;}
  .stat-pill .lbl{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
  .stat-pill .val{font-size:16px;font-weight:800;}
  .fin-tools{display:flex;gap:8px;}
  .fin-tools button{background:var(--card);border:1.5px solid var(--line);width:36px;height:36px;border-radius:10px;font-size:15px;}

  .card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:18px;border:1px solid var(--line);}
  .card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .card-head h3{margin:0;font-size:16px;font-weight:800;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:900px){ .grid-2{grid-template-columns:1fr;} .fin-shell{grid-template-columns:1fr;} .fin-main{border-left:none;padding-left:0;} }

  .day-group-head{display:flex;justify-content:space-between;padding:14px 4px 6px 4px;color:var(--muted);font-size:12.5px;font-weight:700;}
  .txn-row{display:flex;align-items:center;gap:14px;background:var(--card);padding:13px 16px;border-bottom:1px solid var(--line);border-radius:10px;margin-bottom:2px;}
  .txn-row:hover{background:var(--bg);}
  .cat-circle{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;color:#fff;}
  .txn-info{flex:1;min-width:0;}
  .txn-info .cat{font-weight:700;font-size:15px;}
  .txn-info .note{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .txn-amt{font-weight:800;font-size:15px;}
  .txn-amt.expense{color:var(--ink);}
  .txn-amt.income{color:var(--green);}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 30px;color:var(--muted);text-align:center;}
  .empty-state .em-icon{font-size:48px;margin-bottom:14px;opacity:.5;}
  .empty-state .em-title{font-weight:700;font-size:16px;color:var(--ink);margin-bottom:4px;}

  .donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap;}
  .donut-canvas-holder{position:relative;width:150px;height:150px;flex-shrink:0;}
  .donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-direction:column;}
  .donut-center small{font-size:10px;color:var(--muted);font-weight:600;}
  .legend{flex:1;display:flex;flex-direction:column;gap:9px;min-width:150px;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:13px;}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .legend-item .lname{flex:1;font-weight:600;}
  .legend-item .lpct{color:var(--muted);font-weight:700;}

  .cat-bar-row{margin-bottom:14px;}
  .cat-bar-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .cat-bar-top .ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;}
  .cat-bar-top .nm{flex:1;font-weight:700;font-size:13.5px;}
  .cat-bar-top .pc{color:var(--muted);font-size:12.5px;font-weight:600;margin-right:8px;}
  .cat-bar-top .am{font-weight:800;font-size:13.5px;}
  .cat-bar-track{height:7px;background:var(--line);border-radius:6px;overflow:hidden;}
  .cat-bar-fill{height:100%;border-radius:6px;}

  .stat-grid{display:flex;justify-content:space-between;text-align:center;}
  .stat-grid>div{flex:1;}
  .stat-grid .lbl{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px;}
  .stat-grid .val{font-size:17px;font-weight:800;}
  .row-between{display:flex;align-items:center;justify-content:space-between;}

  .acc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
  .account-card{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border:1px solid var(--line);cursor:pointer;}
  .account-card:hover{border-color:var(--primary);}
  .account-card .aic{width:44px;height:44px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .account-card .atxt{flex:1;}
  .account-card .aname{font-weight:800;font-size:15px;}
  .account-card .atype{font-size:12px;color:var(--muted);}
  .account-card .aamt{font-weight:800;font-size:15px;}
  .add-account-card{display:flex;align-items:center;justify-content:center;border:1.5px dashed var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;color:var(--muted);font-weight:700;}
  .add-account-card:hover{border-color:var(--primary-dark);color:var(--ink);}

  /* ---------- REMINDERS ---------- */
  .rem-shell{max-width:900px;margin:0 auto;padding:0 28px 50px 28px;}
  .rem-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;border-radius:var(--radius-sm);border:1.5px solid var(--line);background:var(--card);font-size:14.5px;color:var(--ink);}
  .field input:focus,.field select:focus{outline:none;border-color:var(--primary-dark);}
  .primary-btn{background:var(--ink);color:var(--primary);border:none;padding:13px 22px;border-radius:var(--radius-sm);font-weight:800;font-size:14.5px;cursor:pointer;}
  .primary-btn:hover{opacity:.9;}
  .status-on{background:#FBD8D8;color:#8f2b2b;padding:7px 14px;margin:3px;border:none;cursor:pointer;border-radius:8px;font-weight:700;font-size:12.5px;}
  .status-off{background:#D6F0DF;color:#1f6b3c;padding:7px 14px;margin:3px;border:none;cursor:pointer;border-radius:8px;font-weight:700;font-size:12.5px;}
  .hidden{display:none;}
  .day-check-row{display:flex;flex-wrap:wrap;gap:12px;margin:8px 0 16px;font-size:13.5px;}
  .day-check-row label{display:flex;align-items:center;gap:5px;font-weight:600;}
  .rem-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .rem-item .ri-top{display:flex;justify-content:space-between;align-items:center;}
  .rem-item .ri-name{font-weight:800;font-size:15px;}
  .rem-item .ri-meta{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .rem-item .ri-amt{font-weight:800;font-size:15px;}

  /* ---------- GROCERY EXPIRY REMINDER ---------- */
  .groc-cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:16px;}
  .groc-cat-tile{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:20px 10px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;text-align:center;}
  .groc-cat-tile:hover{border-color:var(--primary-dark);transform:translateY(-2px);}
  .groc-cat-tile .gc-img{width:64px;height:64px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:32px;}
  .groc-cat-tile .gc-name{font-weight:700;font-size:13.5px;}
  .groc-cat-tile .gc-count{font-size:11px;color:var(--muted);}
  .exp-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;}
  .exp-badge.expired{background:#FBD8D8;color:#8f2b2b;}
  .exp-badge.soon{background:#FDEBC8;color:#8a5a06;}
  .exp-badge.fresh{background:#D6F0DF;color:#1f6b3c;}
  .groc-section-title{font-size:12.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:20px 0 8px 2px;}
  .groc-section-title:first-child{margin-top:0;}
  .rem-actions{display:flex;gap:8px;margin-top:8px;}
  .icon-x{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;}
  .icon-x:hover{color:var(--red);}

  /* ---------- REMINDER TIMING (default vs customize) ---------- */
  .segmented{display:flex;border:1.5px solid var(--ink);border-radius:10px;overflow:hidden;}
  .segmented button, .mode-btn{flex:1;padding:9px 0;background:var(--card);border:none;font-weight:700;font-size:13px;color:var(--ink);cursor:pointer;}
  .segmented button:not(:last-child), .mode-btn:not(:last-child){border-right:1.5px solid var(--ink);}
  .segmented button.active, .mode-btn.active{background:var(--primary);color:var(--ink);}
  .hint-box{background:var(--bg);border:1px dashed var(--line);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--muted);margin-bottom:14px;}
  .mode-tag{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:10px;background:#EFE3FF;color:#6B3FA0;margin-left:6px;vertical-align:middle;}
  .mode-tag.default{background:var(--line);color:var(--muted);}
  .offset-check-row{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0 14px;font-size:13px;}
  .offset-check-row label{display:flex;align-items:center;gap:5px;font-weight:600;background:var(--bg);padding:6px 10px;border-radius:8px;}

  /* ---------- LIST TO BUY (shopping list) ---------- */
  .shop-add-row{display:grid;grid-template-columns:1.6fr 0.9fr 0.8fr 1fr 1.1fr auto;gap:10px;align-items:end;}
  @media(max-width:900px){ .shop-add-row{grid-template-columns:1fr 1fr; margin-bottom:6px;} }
  .shop-table{width:100%;border-collapse:collapse;margin-top:6px;}
  .shop-table th{text-align:left;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;padding:8px 10px;border-bottom:1.5px solid var(--line);}
  .shop-row td{padding:12px 10px;border-bottom:1px solid var(--line);font-size:14.5px;}
  .shop-row.bought{background:#E4F6EA;}
  .shop-row .shop-name{font-weight:700;}
  .shop-row .shop-bought-btn{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;color:#fff;}
  .shop-row.bought .shop-bought-btn{background:var(--green);border-color:var(--green);}
  .shop-linked-tag{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:10px;background:#FDEBC8;color:#8a5a06;margin-left:6px;}
  .shop-inline-input{width:100px;padding:6px 8px;border:1.5px solid var(--line);border-radius:7px;background:var(--card);font-size:13px;color:var(--ink);}
  .shop-act-btn{border:1.5px solid var(--line);background:var(--card);border-radius:8px;padding:6px 9px;font-size:13px;cursor:pointer;white-space:nowrap;}
  .shop-act-btn.done{background:#E4F6EA;border-color:var(--green);color:#1f6b3c;font-weight:700;}

  /* ---------- PERISHABLE ITEMS (Groceries transactions) ---------- */
  .perishable-add-row{display:grid;grid-template-columns:1.4fr 1.1fr 1fr auto;gap:8px;margin-bottom:12px;}
  @media(max-width:640px){ .perishable-add-row{grid-template-columns:1fr 1fr;} }
  .perishable-add-row input, .perishable-add-row select{padding:10px 11px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);font-size:13.5px;color:var(--ink);}
  .grocery-item-expiry-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;}
  .perishable-chip-list{display:flex;flex-wrap:wrap;gap:8px;}
  .perishable-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--line);border-radius:20px;padding:6px 6px 6px 12px;font-size:12.5px;font-weight:600;}
  .perishable-chip small{color:var(--muted);font-weight:600;}
  .perishable-chip button{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:2px 6px;}
  .perishable-chip button:hover{color:#D64545;}
  .perishable-total-box{background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:12px 16px;font-size:15px;font-weight:700;text-align:center;}
  .shop-act-btn:hover{border-color:var(--primary-dark);}

  /* ---------- ADMIN ---------- */
  .admin-shell{max-width:1000px;margin:0 auto;padding:0 28px 60px 28px;}
  .admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media(max-width:800px){.admin-grid{grid-template-columns:1fr;}}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);}
  .toggle-row:last-child{border-bottom:none;}
  .toggle-row .tr-txt{font-weight:600;font-size:14px;}
  .toggle-row .tr-sub{font-size:12px;color:var(--muted);}
  .toggle{position:relative;width:44px;height:25px;background:#e2e2e5;border-radius:20px;border:none;flex-shrink:0;cursor:pointer;}
  .toggle::after{content:'';position:absolute;top:2px;left:2px;width:21px;height:21px;background:#fff;border-radius:50%;transition:transform .15s ease;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .toggle.on{background:var(--primary);}
  .toggle.on::after{transform:translateX(19px);}
  .theme-swatches{display:flex;gap:12px;flex-wrap:wrap;}
  .swatch{width:64px;height:64px;border-radius:14px;cursor:pointer;border:2.5px solid transparent;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .swatch.selected{border-color:var(--ink);}
  .admin-danger{border:1.5px solid var(--red);border-radius:12px;padding:16px;}
  .admin-danger h4{color:var(--red);margin:0 0 6px 0;}
  .btn-outline{background:none;border:1.5px solid var(--line);padding:10px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13.5px;cursor:pointer;}
  .btn-outline:hover{border-color:var(--primary-dark);}
  .btn-danger-outline{background:none;border:1.5px solid var(--red);color:var(--red);padding:10px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13.5px;cursor:pointer;}
  .btn-danger-outline:hover{background:var(--red);color:#fff;}
  .admin-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
  input[type=file]{padding:8px;}

  /* ---------- MODAL (centered dialog for desktop) ---------- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s ease;padding:20px;}
  .overlay.show{opacity:1;pointer-events:auto;}
  .dialog{background:var(--bg);width:440px;max-width:100%;border-radius:18px;max-height:90vh;overflow-y:auto;transform:scale(.96);transition:transform .18s ease;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .overlay.show .dialog{transform:scale(1);}
  .dialog-header{background:var(--primary);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;border-radius:18px 18px 0 0;flex-shrink:0;}
  .dialog-header h2{margin:0;font-size:16.5px;font-weight:800;}
  .dialog-header .txt-btn{background:none;border:none;font-size:14.5px;font-weight:700;color:var(--ink);cursor:pointer;padding:4px 6px;}

  /* Add Expense/Income/Transfer sheet — keep a stable height so shorter
     Income/Transfer views don't sink to the bottom of the screen. */
  .dialog.sheet{display:flex;flex-direction:column;overflow:hidden;min-height:min(680px, 90vh);}
  .dialog.sheet .kind-tabs{flex-shrink:0;}
  .dialog.sheet .dialog-scroll{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}
  .transfer-form{padding:16px 16px 8px 16px;}

  .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 6px;padding:18px 14px;}
  .cat-cell{display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;cursor:pointer;}
  .cat-cell .cc-ic{width:50px;height:50px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;}
  .cat-cell .cc-lbl{font-size:11.5px;font-weight:600;text-align:center;color:var(--ink);line-height:1.2;}
  .cat-cell:hover .cc-ic{outline:2px solid var(--primary-dark);}

  .amount-display{text-align:center;padding:22px 16px 6px 16px;}
  .amount-display .cat-tag{display:inline-flex;align-items:center;gap:8px;background:var(--card);padding:6px 14px 6px 6px;border-radius:20px;font-weight:700;font-size:13px;margin-bottom:14px;box-shadow:var(--shadow);}
  .amount-display .cat-tag .tag-ic{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}
  .amount-display .num{font-size:38px;font-weight:800;letter-spacing:-1px;word-break:break-all;}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);margin:14px 0 0 0;}
  .keypad button{background:var(--card);border:none;padding:15px 0;font-size:19px;font-weight:600;color:var(--ink);cursor:pointer;}
  .keypad button:hover{background:var(--bg);}
  .keypad button.op{color:var(--primary-dark);font-size:17px;}

  .icon-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;padding:0 16px;}
  .icon-picker .ip-cell{aspect-ratio:1;border-radius:10px;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;border:none;cursor:pointer;}
  .icon-picker .ip-cell.selected{background:var(--primary);}

  .save-btn{margin:18px 16px 24px 16px;background:var(--ink);color:var(--primary);border:none;padding:14px 0;border-radius:var(--radius-sm);font-size:15px;font-weight:800;cursor:pointer;width:calc(100% - 32px);}
  .save-btn:hover{opacity:.9;}
  .danger-btn{background:#fff;color:var(--red);border:1.5px solid var(--red);}
  .two-btn{display:flex;gap:10px;margin:18px 16px 24px;}
  .two-btn button{flex:1;padding:13px 0;border-radius:var(--radius-sm);font-weight:800;font-size:14.5px;border:none;cursor:pointer;}
  .btn-edit{background:var(--primary);color:var(--ink);}
  .btn-delete{background:#fff;color:var(--red);border:1.5px solid var(--red) !important;}
  .detail-row{display:flex;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--line);}
  .detail-row .dk{color:var(--muted);font-size:13.5px;}
  .detail-row .dv{font-weight:700;font-size:14.5px;}
  .details-hero{display:flex;flex-direction:column;align-items:center;padding:26px 16px 8px;}
  .details-hero .dh-ic{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;margin-bottom:8px;}
  .details-hero .dh-name{font-size:17px;font-weight:800;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:12px;}
  .cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding-bottom:4px;}
  .cal-cell{aspect-ratio:1;border-radius:8px;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:600;border:none;cursor:pointer;}
  .cal-cell .amt{font-size:9px;color:#c0392b;font-weight:700;margin-top:2px;}
  .cal-cell.empty{background:none;cursor:default;}
  .cal-cell.today{background:#DFF3E6;}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 22px;border-radius:24px;font-size:13.5px;font-weight:600;z-index:400;opacity:0;transition:opacity .2s ease;pointer-events:none;}
  .toast.show{opacity:1;}

  /* ---------- MOBILE ---------- */
  @media(max-width:640px){
    #topbar{padding:12px 14px;flex-wrap:wrap;gap:8px;}
    .tb-left{font-size:15px;}
    .tb-logo{width:28px;height:28px;font-size:14px;}
    .tb-right{gap:6px;}
    .tb-btn{padding:8px 10px;font-size:12px;}
    .dash-wrap{padding:36px 16px;}
    .dash-wrap h1{font-size:23px;}
    .dash-cards{gap:16px;}
    .sub-title-row{padding:6px 16px 18px 16px;}
    .sub-title-row h1{font-size:20px;}
    .back-btn{padding:14px 16px 0 16px;}
    .fin-shell{padding:0 14px 30px 14px;}
    .fin-topbar{flex-direction:column;align-items:stretch;gap:10px;}
    .stat-pill-row{overflow-x:auto;}
    .card{padding:16px;margin:0 0 14px 0;}
    .rem-shell, .admin-shell{padding:0 14px 40px 14px;}
    .cat-grid{grid-template-columns:repeat(3,1fr);gap:14px 4px;}
    .groc-cat-grid{grid-template-columns:repeat(2,1fr);}
    .dialog{width:100%;border-radius:18px;}
    .overlay{padding:0;align-items:flex-end;}
    .overlay .dialog{border-radius:18px 18px 0 0;max-height:94vh;}
    .overlay.sheet-overlay{align-items:flex-end;}
    .overlay.sheet-overlay .dialog.sheet{
      height:90vh; min-height:90vh; max-height:94vh;
      border-radius:18px 18px 0 0;
    }
    .acc-grid{grid-template-columns:1fr;}
    .alarm-banner{flex-wrap:wrap;padding:12px 14px;}
    .alarm-banner .ab-actions{width:100%;justify-content:flex-end;}
  }

  /* ---------- ALARM BANNER ---------- */
  .alarm-banner{
    position:fixed;top:0;left:0;right:0;z-index:500;background:#1A1A1A;color:#fff;
    display:flex;align-items:center;gap:16px;padding:14px 24px;box-shadow:0 4px 18px rgba(0,0,0,.35);
    animation:alarmSlide .25s ease;
  }
  @keyframes alarmSlide{from{transform:translateY(-100%);}to{transform:translateY(0);}}
  .alarm-banner .ab-ic{font-size:26px;animation:alarmPulse 1s infinite;flex-shrink:0;}
  @keyframes alarmPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}
  .alarm-banner .ab-body{flex:1;min-width:0;}
  .alarm-banner .ab-title{font-weight:800;font-size:14.5px;}
  .alarm-banner .ab-sub{font-size:12.5px;opacity:.75;}
  .alarm-banner .ab-actions{display:flex;gap:8px;flex-shrink:0;}
  .alarm-banner button{border:none;border-radius:8px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;}
  .ab-btn-done{background:var(--primary);color:#1A1A1A;}
  .ab-btn-snooze{background:#3a3a3d;color:#fff;}
  .ab-btn-used{background:#D64545;color:#fff;}
  #bellBtn.on{background:var(--primary);color:var(--ink);border-color:var(--primary-dark);}

  /* ---------- VOICE ASSISTANT ---------- */
  .voice-fab{
    position:fixed; right:22px; bottom:22px; width:58px; height:58px; border-radius:50%;
    background:var(--ink); color:var(--primary); border:none; font-size:25px; cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.28); z-index:250; display:flex; align-items:center; justify-content:center;
  }
  .voice-fab:hover{opacity:.92;}
  .voice-fab.listening{background:#D64545; animation:micPulse 1s infinite;}
  @keyframes micPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.14);}}
  .voice-transcript{
    position:fixed; right:22px; bottom:90px; max-width:280px; background:var(--card); color:var(--ink);
    border:1.5px solid var(--line); border-radius:12px; padding:11px 15px; font-size:12.5px; line-height:1.4;
    box-shadow:var(--shadow); z-index:250;
  }
  .voice-transcript.hidden{display:none;}
  @media(max-width:640px){ .voice-fab{right:16px;bottom:16px;width:52px;height:52px;font-size:22px;} .voice-transcript{right:16px;bottom:78px;max-width:220px;} }

  /* ---------- AUTH (Login / Sign up) ---------- */
  #auth-screen{
    position:fixed; inset:0; z-index:9000; background:var(--bg);
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  #auth-screen.hidden{display:none;}
  .auth-card{
    width:100%; max-width:420px; background:var(--card); border:1.5px solid var(--line);
    border-radius:20px; padding:28px 22px; box-shadow:var(--shadow);
  }
  .auth-brand{display:flex;align-items:center;gap:10px;margin-bottom:18px;font-weight:800;font-size:18px;}
  .auth-brand .logo{width:40px;height:40px;border-radius:12px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:20px;}
  .auth-card h1{margin:0 0 6px;font-size:26px;font-weight:800;}
  .auth-card .auth-sub{color:var(--muted);margin:0 0 18px;font-size:14px;line-height:1.45;}
  .auth-tabs{display:flex;border:1.5px solid var(--ink);border-radius:10px;overflow:hidden;margin-bottom:16px;}
  .auth-tabs button{flex:1;padding:10px 0;border:none;background:var(--card);font-weight:700;font-size:14px;cursor:pointer;color:var(--ink);}
  .auth-tabs button.active{background:var(--primary);}
  .auth-error{color:var(--red);font-weight:600;font-size:13px;margin:0 0 10px;}
  .auth-info{color:var(--green);font-weight:600;font-size:13px;margin:0 0 10px;}
  #auth-screen .primary-btn{width:100%;margin-top:4px;}
  #topbar .user-chip{font-size:12px;color:var(--muted);font-weight:700;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;align-self:center;}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-brand"><div class="logo">💠</div>Finance Tracker</div>
    <h1 id="authTitle">Welcome back</h1>
    <p class="auth-sub" id="authSub">Sign in to open your dashboard</p>
    <div class="auth-tabs">
      <button type="button" id="tabLogin" class="active" onclick="setAuthMode('login')">Login</button>
      <button type="button" id="tabSignup" onclick="setAuthMode('signup')">Sign up</button>
    </div>
    <div class="field" id="authNameField" style="display:none;">
      <label>Full name</label>
      <input id="authName" type="text" placeholder="Your name" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input id="authEmail" type="email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="authPassword" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <p class="auth-error hidden" id="authError"></p>
    <p class="auth-info hidden" id="authInfo"></p>
    <button class="primary-btn" id="authSubmitBtn" onclick="submitAuth()">Login</button>
  </div>
</div>

<div id="topbar">
  <div class="tb-left" onclick="goDashboard()"><span class="tb-logo">💠</span><span id="appNameLabel">All-in-One Dashboard</span></div>
  <div class="tb-right">
    <span class="user-chip" id="userChip"></span>
    <button class="tb-btn" id="bellBtn" onclick="enableAlerts()" title="Enable alarm sound & notifications">🔔 Alerts</button>
    <button class="tb-btn" onclick="goDashboard()">Dashboard</button>
    <button class="tb-btn admin-btn" id="adminBtn" onclick="enterAdmin()">⚙ Admin</button>
    <button class="tb-btn" id="logoutBtn" onclick="logoutAuth()">Logout</button>
  </div>
</div>

<div id="alarm-banner-root"></div>

<div id="app-root">
  <div id="view-dashboard" class="view active"></div>
  <div id="view-finance" class="view"></div>
  <div id="view-reminderDashboard" class="view"></div>
  <div id="view-expenseRem" class="view"></div>
  <div id="view-medicineRem" class="view"></div>
  <div id="view-groceryRem" class="view"></div>
  <div id="view-shoppingList" class="view"></div>
  <div id="view-generalRem" class="view"></div>
  <div id="view-admin" class="view"></div>
</div>

<div id="modal-root"></div>

   top-level EXPENSE_CATS entry of the same name. Rather than showing
   "Vegetables" as both its own expense category AND a sub-category choice
   nested under "Groceries", these three get picked directly at the
   top level — so item-tagging shows their items immediately with no
   extra category step. Everything else without its own top-level
   expense category (Pulses & Lentils, Dairy & Eggs, Meat & Seafood,
   Grains & Cereals, Bakery, Spices & Condiments, Beverages, Frozen
   Foods) stays nested as a sub-category choice under "Groceries". */
const GROCERY_DIRECT_EXPENSE_CATS = ['Vegetables','Fruits','Snacks'];
const GROCERY_FAMILY_CATS = ['Groceries', ...GROCERY_DIRECT_EXPENSE_CATS];
function getGroceryItemScope(category){
  if(GROCERY_DIRECT_EXPENSE_CATS.includes(category)){
    const cat = GROCERY_CATEGORIES.find(c=>c.name===category);
    return cat ? {mode:'direct', items:cat.items, icon:cat.icon, categoryName:cat.name} : null;
  }
  if(category==='Groceries'){
    const subcats = GROCERY_CATEGORIES.filter(c=>!GROCERY_DIRECT_EXPENSE_CATS.includes(c.name));
    return {mode:'subcategory', subcats};
  }
  return null;
}
/* Categories whose contents spoil quickly enough to be worth an expiry
   reminder. Used to auto-flag likely perishable items when importing
   or scanning a document for the Personal Finance Tracker. */
const PERISHABLE_CATEGORY_NAMES = ['Vegetables','Fruits','Dairy & Eggs','Meat & Seafood'];
function findPerishableMatch(text){
  const lower = (text||'').toLowerCase();
  if(!lower.trim()) return null;
  for(const catName of PERISHABLE_CATEGORY_NAMES){
    const cat = GROCERY_CATEGORIES.find(c=>c.name===catName);
    if(!cat) continue;
    for(const it of cat.items){
      const escaped = it.name.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const re = new RegExp('\\b'+escaped+'\\b','i');
      if(re.test(lower)) return {category:cat.name, icon:it.icon, matchedName:it.name};
    }
  }
  return null;
}

   this merge may instead have a single `groceryCategory`/`groceryItem`
   tag and/or a separate `perishableItems` array — this reconstructs an
   equivalent list from those so old data keeps displaying correctly. */
function getTxnGroceryItems(t){
  if(Array.isArray(t.groceryItems)) return t.groceryItems;
  const list = [];
  if(t.groceryItem){
    list.push({id:'legacy-tag', name:t.groceryItem, category:t.groceryCategory||'', icon:'', expiryDate:'', groceryReminderId:null});
  }
  if(Array.isArray(t.perishableItems)){
    t.perishableItems.forEach(p=>list.push({id:p.id, name:p.name, category:p.category, icon:p.icon, expiryDate:p.expiryDate||'', groceryReminderId:p.groceryReminderId||null}));
  }
  return list;
}

   STATE (persisted to localStorage — this file is meant to be
   hosted on your own site; note: in an in-chat artifact preview
   browser storage is sandboxed, so use "Export/Import Data" in
   the Admin Panel to move data between sessions there)
   ============================================================ */
function readRawJSON(key){
  try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
/* Config needs a DEEP merge, not a shallow one: a config saved by an
   older version of this file won't have newer keys inside nested
   objects like `features` or `medicineTimes` (e.g. groceryExpiryReminder
   was added later). A shallow Object.assign would let the old,
   incomplete `features` object silently replace the new defaults,
   making newer features vanish even though the code supports them. */
function mergeConfig(saved){
  const merged = Object.assign({}, DEFAULT_CONFIG, saved||{});
  merged.features = Object.assign({}, DEFAULT_CONFIG.features, (saved && saved.features) || {});
  merged.medicineTimes = Object.assign({}, DEFAULT_CONFIG.medicineTimes, (saved && saved.medicineTimes) || {});
  merged.expenseOffsets = (saved && Array.isArray(saved.expenseOffsets) && saved.expenseOffsets.length) ? saved.expenseOffsets : DEFAULT_CONFIG.expenseOffsets;
  merged.groceryOffsets = (saved && Array.isArray(saved.groceryOffsets) && saved.groceryOffsets.length) ? saved.groceryOffsets : DEFAULT_CONFIG.groceryOffsets;
  merged.alarmDurationSec = (saved && typeof saved.alarmDurationSec==='number') ? saved.alarmDurationSec : DEFAULT_CONFIG.alarmDurationSec;
  return merged;
}

function loadJSON(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(!raw) return fallback;
    const parsed = JSON.parse(raw);
    if(Array.isArray(fallback)){
      if(Array.isArray(parsed)) return parsed;
      // Recovery path: earlier versions of this file could corrupt an
      // array into a plain object (e.g. {"0":{...},"1":{...}}) via an
      // unsafe merge. If that happened, rebuild the array from it
      // instead of losing the saved data.
      if(parsed && typeof parsed==='object') return Object.values(parsed);
      return fallback;
    }
    return (parsed && typeof parsed==='object') ? Object.assign({}, fallback, parsed) : fallback;
  }catch(e){ return fallback; }
}

}

/* Lightweight dependency-free donut chart renderer (native Canvas 2D —
   no external charting library required, so this works fully offline). */
function drawDonut(canvasId, values, colors, cutout){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const holder = canvas.parentElement;
  const size = Math.max(60, holder.clientWidth || 150);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size*dpr; canvas.height = size*dpr;
  canvas.style.width = size+'px'; canvas.style.height = size+'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,size,size);
  const cx=size/2, cy=size/2, radius=size/2 - 1;
  const innerRadius = radius*(cutout||0.72);
  const total = values.reduce((s,v)=>s+v,0) || 1;
  let start = -Math.PI/2;
  values.forEach((val,i)=>{
    if(val<=0) return;
    const angle = (val/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,radius,start,start+angle);
    ctx.closePath();
    ctx.fillStyle = colors[i]||'#ccc';
    ctx.fill();
    start += angle;
  });
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(cx,cy,innerRadius,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
}

function rangeStartEnd(){
  if(chartsRange==='week'){ const d=new Date(); const day=d.getDay(); const start=new Date(d); start.setDate(d.getDate()-day); const end=new Date(start); end.setDate(start.getDate()+6); return [start.toISOString().slice(0,10), end.toISOString().slice(0,10)]; }
  if(chartsRange==='year'){ const y=currentMonth.slice(0,4); return [y+'-01-01', y+'-12-31']; }
  const [y,mo]=currentMonth.split('-').map(Number); const start=new Date(y,mo-1,1), end=new Date(y,mo,0);
  return [start.toISOString().slice(0,10), end.toISOString().slice(0,10)];
}

let kpKeyHandler = null;

function openAddTransaction(kind){
  addCtx = {kind, category:null, amountStr:'0', date:todayStr(), note:'', accountId: financeState.accounts[0]?.id||null, toAccountId:null, editingId:null, groceryItems:[]};
  const wrap = openModal('');
  drawAddStep1(wrap);
}
function drawAddStep1(wrap){
  const dlg = wrap.querySelector('.dialog');
  wrap.classList.add('sheet-overlay');
  dlg.classList.add('sheet');
  const isTransfer = addCtx.kind==='transfer';
  let body;
  if(isTransfer){
    body = `<div class="transfer-form">
      <div class="field"><label>From Account</label><select id="fromAcc">${financeState.accounts.map(a=>`<option value="${a.id}">${escapeHtml(a.name)}</option>`).join('')}</select></div>
      <div class="field"><label>To Account</label><select id="toAcc">${financeState.accounts.map(a=>`<option value="${a.id}">${escapeHtml(a.name)}</option>`).join('')}</select></div>
      <button class="save-btn" onclick="proceedTransferAmount()">Continue</button>
    </div>`;
  } else {
    const cats = addCtx.kind==='expense' ? EXPENSE_CATS : INCOME_CATS;
    body = `<div class="cat-grid">${cats.map(cat=>`<button class="cat-cell" onclick="pickCategory('${cat.name}')"><div class="cc-ic" style="background:${catColor(cat.name)}22;">${cat.icon}</div><div class="cc-lbl">${cat.name}</div></button>`).join('')}</div>`;
  }
  dlg.innerHTML = `
    <div class="dialog-header"><button class="txt-btn" onclick="closeTopModal()">Cancel</button><h2>Add</h2><div style="width:50px"></div></div>
    <div class="kind-tabs" style="display:flex;border:1.5px solid var(--ink);border-radius:10px;overflow:hidden;margin:14px 16px 10px 16px;">
      ${['expense','income','transfer'].map(k=>`<button style="flex:1;padding:10px 0;border:none;font-weight:700;font-size:13.5px;cursor:pointer;background:${addCtx.kind===k?'var(--ink)':'var(--primary)'};color:${addCtx.kind===k?'var(--primary)':'var(--ink)'};" onclick="switchAddKind('${k}')">${k[0].toUpperCase()+k.slice(1)}</button>`).join('')}
    </div>
    <div class="dialog-scroll">${body}</div>
  `;
}
function switchAddKind(kind){ addCtx.kind=kind; addCtx.category=null; drawAddStep1(document.querySelector('#modal-root .overlay')); }
function pickCategory(name){ addCtx.category = name; if(!GROCERY_FAMILY_CATS.includes(name)){ addCtx.groceryItems=[]; } renderAddStep2(); }
function proceedTransferAmount(){
  const wrap = document.querySelector('#modal-root .overlay');
  addCtx.accountId = wrap.querySelector('#fromAcc').value;
  addCtx.toAccountId = wrap.querySelector('#toAcc').value;
  if(addCtx.accountId===addCtx.toAccountId){ showToast('Choose two different accounts'); return; }
  renderAddStep2();
}
function renderAddStep2(){
  const wrap = document.querySelector('#modal-root .overlay');
  const dlg = wrap.querySelector('.dialog');
  wrap.classList.add('sheet-overlay');
  dlg.classList.add('sheet');
  const isTransfer = addCtx.kind==='transfer';
  const cats = addCtx.kind==='expense'?EXPENSE_CATS:INCOME_CATS;
  const icon = isTransfer?'🔁':findIcon(cats, addCtx.category);
  const color = isTransfer?'#8A8A8E':catColor(addCtx.category);
  const accOptions = financeState.accounts.map(a=>`<option value="${a.id}" ${a.id===addCtx.accountId?'selected':''}>${escapeHtml(a.name)}</option>`).join('');
  dlg.innerHTML = `
    <div class="dialog-header"><button class="txt-btn" onclick="drawAddStep1(document.querySelector('#modal-root .overlay'))">‹ Back</button><h2>${isTransfer?'Transfer':(addCtx.category||'')}</h2><button class="txt-btn" style="font-weight:800;" onclick="saveTransaction()">Save</button></div>
    <div class="dialog-scroll">
      <div class="amount-display">
        <div class="cat-tag"><span class="tag-ic" style="background:${color}">${icon}</span>${isTransfer?'Transfer':addCtx.category}</div>
        <div class="num" id="amountNum">${currencySymbol()}${addCtx.amountStr}</div>
      </div>
      <div class="keypad" id="keypad"></div>
      <div class="field" style="margin:16px 16px 0 16px;"><label>Date</label><input type="date" id="txnDate" value="${addCtx.date}"></div>
      ${!isTransfer ? `<div class="field" style="margin:14px 16px;"><label>Account</label><select id="txnAccount">${accOptions}</select></div>` : ''}
      <div class="field" style="margin:14px 16px;"><label>Note</label><input type="text" id="txnNote" placeholder="Add a note" value="${escapeHtml(addCtx.note)}"></div>
      ${(!isTransfer && GROCERY_FAMILY_CATS.includes(addCtx.category)) ? buildGroceryItemsSectionHtml() : ''}
    </div>
  `;
  buildKeypad();
  dlg.querySelector('#txnDate').addEventListener('change', e=>addCtx.date=e.target.value);
  dlg.querySelector('#txnNote').addEventListener('input', e=>addCtx.note=e.target.value);
  const accSel = dlg.querySelector('#txnAccount');
  if(accSel) accSel.addEventListener('change', e=>addCtx.accountId=e.target.value);
  if(GROCERY_FAMILY_CATS.includes(addCtx.category)){ initGroceryItemPicker(); renderGroceryItemChips(); }

  document.removeEventListener('keydown', kpKeyHandler);
  kpKeyHandler = (e)=>{
    if(document.activeElement && ['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) return;
    if(/^[0-9]$/.test(e.key)) kpPress(e.key);
    else if(e.key==='.') kpPress('.');
    else if(e.key==='Backspace') kpPress('⌫');
    else if(e.key==='Enter') saveTransaction();
  };
  document.addEventListener('keydown', kpKeyHandler);
}
/* Builds the single, unified "Add Items" section shown for Groceries,
   Vegetables, Fruits, and Snacks transactions. Combines what used to be
   two separate optional sections (a grocery category/item tag, and a
   perishable-goods list) into one: pick an item, optionally give it an
   expiry date. Items with a date are also tracked in Grocery Expiry
   Reminder; items left without a date are just a label on the purchase. */
function buildGroceryItemsSectionHtml(){
  const scope = getGroceryItemScope(addCtx.category);
  if(!scope) return '';
  const subcatPicker = scope.mode==='subcategory' ? `
    <div class="field" style="margin:0 0 10px;"><label>Category</label>
      <select id="grocSubcatSelect" onchange="onGrocSubcatChange()">
        <option value="">— Select a category —</option>
        ${scope.subcats.map(c=>`<option value="${c.name}">${c.icon} ${c.name}</option>`).join('')}
      </select>
    </div>` : '';
  const initialItemOptions = scope.mode==='direct'
    ? buildGrocItemSelectOptions(scope.items)
    : `<option value="">— Select a category first —</option>`;
  return `
    <div class="card" style="margin:16px;padding:14px 16px;">
      <div style="font-weight:800;font-size:13.5px;margin-bottom:2px;">🛒 Add Items (optional)</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Tag specific items from this purchase. Give an item an expiry date to also track it in Grocery Expiry Reminder — leave the date blank to just label the purchase.</div>
      ${subcatPicker}
      <div class="field" style="margin:0 0 10px;"><label>Item</label>
        <select id="grocItemSelect" onchange="onGrocItemPickChange()">${initialItemOptions}</select>
      </div>
      <div class="field hidden" id="grocItemCustomWrap" style="margin:0 0 10px;"><input type="text" id="grocItemCustomName" placeholder="Item name"></div>
      <div class="perishable-add-row grocery-item-expiry-row">
        <div class="field" style="margin:0;"><label>Expiry Date (optional)</label><input type="date" id="grocItemExpiry"></div>
        <button type="button" class="btn-outline" style="align-self:end;" onclick="addGroceryItemChip()">+ Add</button>
      </div>
      <div id="groceryItemChips" class="perishable-chip-list" style="margin-top:12px;"></div>
    </div>`;
}
function buildGrocItemSelectOptions(items){
  let opts = items.map(it=>`<option value="${it.name}">${it.icon} ${it.name}</option>`).join('');
  opts += `<option value="__others__">➕ Others (type below)</option>`;
  return opts;
}
function initGroceryItemPicker(){
  const scope = getGroceryItemScope(addCtx.category);
  if(!scope || scope.mode!=='subcategory') return;
  const subSel = document.getElementById('grocSubcatSelect');
  if(subSel) subSel.value = '';
  const itemSel = document.getElementById('grocItemSelect');
  if(itemSel) itemSel.innerHTML = `<option value="">— Select a category first —</option>`;
}
function onGrocSubcatChange(){
  const subSel = document.getElementById('grocSubcatSelect');
  const itemSel = document.getElementById('grocItemSelect');
  if(!subSel || !itemSel) return;
  const cat = GROCERY_CATEGORIES.find(c=>c.name===subSel.value);
  itemSel.innerHTML = cat ? buildGrocItemSelectOptions(cat.items) : `<option value="">— Select a category first —</option>`;
  onGrocItemPickChange();
}
function onGrocItemPickChange(){
  const itemSel = document.getElementById('grocItemSelect');
  const customWrap = document.getElementById('grocItemCustomWrap');
  if(!itemSel || !customWrap) return;
  customWrap.classList.toggle('hidden', itemSel.value!=='__others__');
}
function addGroceryItemChip(){
  const scope = getGroceryItemScope(addCtx.category);
  if(!scope) return;
  const itemSel = document.getElementById('grocItemSelect');
  const customEl = document.getElementById('grocItemCustomName');
  const expEl = document.getElementById('grocItemExpiry');
  let category, name, icon;
  if(scope.mode==='subcategory'){
    const subSel = document.getElementById('grocSubcatSelect');
    category = subSel ? subSel.value : '';
    if(!category){ showToast('Choose a category first'); return; }
    const cat = GROCERY_CATEGORIES.find(c=>c.name===category);
    if(itemSel.value==='__others__'){
      name = customEl.value.trim(); icon = '🥡';
    } else {
      const it = cat ? cat.items.find(i=>i.name===itemSel.value) : null;
      name = itemSel.value; icon = it ? it.icon : '🥡';
    }
  } else {
    category = scope.categoryName;
    if(itemSel.value==='__others__'){
      name = customEl.value.trim(); icon = '🥡';
    } else {
      const it = scope.items.find(i=>i.name===itemSel.value);
      name = itemSel.value; icon = it ? it.icon : scope.icon;
    }
  }
  if(!name){ showToast('Choose or type an item name'); return; }
  const expiryDate = expEl.value || '';
  addCtx.groceryItems.push({id:uid(), name, category, icon, expiryDate, groceryReminderId:null});
  if(customEl) customEl.value='';
  if(expEl) expEl.value='';
  renderGroceryItemChips();
}
function removeGroceryItemChip(id){
  const idx = addCtx.groceryItems.findIndex(p=>p.id===id);
  if(idx<0) return;
  const item = addCtx.groceryItems[idx];
  if(item.groceryReminderId){
    groceryReminders = groceryReminders.filter(g=>g.id!==item.groceryReminderId);
    saveGroceryRem();
  }
  addCtx.groceryItems.splice(idx,1);
  renderGroceryItemChips();
}
function renderGroceryItemChips(){
  const el = document.getElementById('groceryItemChips');
  if(!el) return;
  if(!addCtx.groceryItems || addCtx.groceryItems.length===0){
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);">No items added yet.</div>';
    return;
  }
  el.innerHTML = addCtx.groceryItems.map(p=>{
    const expiryLabel = p.expiryDate ? `<small>🔔 ${new Date(p.expiryDate+'T00:00:00').toLocaleDateString(undefined,{day:'2-digit',month:'short'})}</small>` : '';
    return `<span class="perishable-chip">${p.icon||'🥡'} ${escapeHtml(p.name)} ${expiryLabel} <button type="button" onclick="removeGroceryItemChip('${p.id}')">✕</button></span>`;
  }).join('');
}
function buildKeypad(){
  const kp = document.getElementById('keypad');
  const keys = ['1','2','3','4','5','6','7','8','9','.','0','⌫'];
  kp.innerHTML = keys.map(k=>`<button class="${k==='⌫'?'op':''}" onclick="kpPress('${k}')">${k}</button>`).join('');
}
function kpPress(k){
  if(k==='⌫') addCtx.amountStr = addCtx.amountStr.length>1 ? addCtx.amountStr.slice(0,-1) : '0';
  else if(k==='.'){ if(!addCtx.amountStr.includes('.')) addCtx.amountStr += '.'; }
  else { addCtx.amountStr = (addCtx.amountStr==='0')?k:addCtx.amountStr+k; if(addCtx.amountStr.length>12) addCtx.amountStr=addCtx.amountStr.slice(0,12); }
  const el = document.getElementById('amountNum');
  if(el) el.textContent = currencySymbol()+addCtx.amountStr;
}
function saveTransaction(){
  const amount = parseFloat(addCtx.amountStr)||0;
  if(amount<=0){ showToast('Enter an amount greater than 0'); return; }
  let txnRef = null;
  if(addCtx.kind==='transfer'){
    const fromAcc = financeState.accounts.find(a=>a.id===addCtx.accountId);
    const toAcc = financeState.accounts.find(a=>a.id===addCtx.toAccountId);
    if(fromAcc) fromAcc.amount -= amount;
    if(toAcc) toAcc.amount += amount;
    financeState.transactions.push({id:addCtx.editingId||uid(), kind:'transfer', category:'Transfer', amount, date:addCtx.date, time:new Date().toTimeString().slice(0,8), note:addCtx.note, accountId:addCtx.accountId, toAccountId:addCtx.toAccountId});
  } else {
    if(addCtx.editingId){
      const t = financeState.transactions.find(x=>x.id===addCtx.editingId);
      const oldAcc = financeState.accounts.find(a=>a.id===t.accountId);
      if(oldAcc) oldAcc.amount += (t.kind==='expense'?t.amount:-t.amount);
      Object.assign(t, {kind:addCtx.kind, category:addCtx.category, amount, date:addCtx.date, note:addCtx.note, accountId:addCtx.accountId});
      const newAcc = financeState.accounts.find(a=>a.id===t.accountId);
      if(newAcc) newAcc.amount += (t.kind==='expense'?-t.amount:t.amount);
      txnRef = t;
    } else {
      const newTxn = {id:uid(), kind:addCtx.kind, category:addCtx.category, amount, date:addCtx.date, time:new Date().toTimeString().slice(0,8), note:addCtx.note, accountId:addCtx.accountId};
      financeState.transactions.push(newTxn);
      const acc = financeState.accounts.find(a=>a.id===addCtx.accountId);
      if(acc) acc.amount += (addCtx.kind==='expense'?-amount:amount);
      txnRef = newTxn;
    }
  }

  if(txnRef){
    if(addCtx.kind==='expense' && GROCERY_FAMILY_CATS.includes(addCtx.category) && addCtx.groceryItems && addCtx.groceryItems.length>0){
      // Create a Grocery Expiry Reminder entry for any tagged item that has
      // an expiry date and doesn't already have one (new additions this
      // session); items edited from an existing transaction that already
      // have a groceryReminderId are left as-is to avoid duplicates. Items
      // without an expiry date are just a label — no reminder created.
      addCtx.groceryItems.forEach(p=>{
        if(!p.expiryDate || p.groceryReminderId) return;
        const groc = {id:uid(), category:p.category||GROCERY_OTHERS.name, item:p.name, icon:p.icon||'🥡', expiryDate:p.expiryDate, quantity:'', note:'', timingMode:'default', customAlertTime:null, customOffsets:null, alarmDurationSec:null, addedDate:todayStr(), fromTransactionId:txnRef.id};
        groceryReminders.push(groc);
        p.groceryReminderId = groc.id;
      });
      txnRef.groceryItems = addCtx.groceryItems.map(p=>({id:p.id, name:p.name, category:p.category, icon:p.icon, expiryDate:p.expiryDate, groceryReminderId:p.groceryReminderId}));
      delete txnRef.groceryCategory; delete txnRef.groceryItem; delete txnRef.perishableItems;
      saveGroceryRem();
    } else {
      const existing = getTxnGroceryItems(txnRef);
      if(existing.length){
        // Category was changed away from the grocery family (or all items
        // were removed) while editing a transaction that previously had
        // tagged items — unlink any linked reminders rather than delete
        // them, so the reminders still stand on their own.
        const idsToUnlink = existing.map(p=>p.groceryReminderId).filter(Boolean);
        idsToUnlink.forEach(gid=>{ const g = groceryReminders.find(x=>x.id===gid); if(g) g.fromTransactionId=null; });
        if(idsToUnlink.length) saveGroceryRem();
      }
      delete txnRef.groceryItems; delete txnRef.groceryCategory; delete txnRef.groceryItem; delete txnRef.perishableItems;
    }
  }

  saveFinance();
  document.removeEventListener('keydown', kpKeyHandler);
  closeAllModals();
  currentMonth = addCtx.date.slice(0,7);
  renderFinTopbar(); renderFinContent();
  showToast('Saved');
}

function openDetails(id){
  const t = financeState.transactions.find(x=>x.id===id); if(!t) return;
  const isTransfer = t.kind==='transfer';
  const icon = isTransfer?'🔁':findIcon(t.kind==='expense'?EXPENSE_CATS:INCOME_CATS, t.category);
  const color = isTransfer?'#8A8A8E':catColor(t.category);
  const accName = financeState.accounts.find(a=>a.id===t.accountId)?.name || '—';
  const taggedItems = getTxnGroceryItems(t);
  const itemsHtml = taggedItems.length ? taggedItems.map(p=>`${escapeHtml(p.name)}${p.expiryDate?` <span class="exp-badge ${expiryStatus(p.expiryDate).cls}">exp ${new Date(p.expiryDate+'T00:00:00').toLocaleDateString(undefined,{day:'2-digit',month:'short'})}</span>`:''}`).join(', ') : '';
  openModal(`
    <div class="dialog-header"><button class="txt-btn" onclick="closeTopModal()">‹ Back</button><h2>Details</h2><div style="width:40px"></div></div>
    <div class="details-hero"><div class="dh-ic" style="background:${color}">${icon}</div><div class="dh-name">${isTransfer?'Transfer':t.category}</div></div>
    <div class="detail-row"><span class="dk">Type</span><span class="dv">${t.kind[0].toUpperCase()+t.kind.slice(1)}</span></div>
    <div class="detail-row"><span class="dk">Amount</span><span class="dv">${fmt(t.amount)}</span></div>
    <div class="detail-row"><span class="dk">Account</span><span class="dv">${escapeHtml(accName)}</span></div>
    <div class="detail-row"><span class="dk">Date</span><span class="dv">${new Date(t.date+'T00:00:00').toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'})}</span></div>
    ${t.note?`<div class="detail-row"><span class="dk">Note</span><span class="dv">${escapeHtml(t.note)}</span></div>`:''}
    ${itemsHtml?`<div class="detail-row"><span class="dk">Items</span><span class="dv">${itemsHtml}</span></div>`:''}
    <div class="two-btn"><button class="btn-edit" onclick="editTransaction('${t.id}')">Edit</button><button class="btn-delete" onclick="deleteTransaction('${t.id}')">Delete</button></div>
  `);
}
function editTransaction(id){
  const t = financeState.transactions.find(x=>x.id===id); if(!t) return;
  closeAllModals();
  addCtx = {kind:t.kind, category:t.category, amountStr:String(t.amount), date:t.date, note:t.note||'', accountId:t.accountId, toAccountId:t.toAccountId||null, editingId:t.id, groceryItems: getTxnGroceryItems(t).map(p=>({...p}))};
  openModal('');
  renderAddStep2();
}
function deleteTransaction(id){
  const t = financeState.transactions.find(x=>x.id===id); if(!t) return;
  if(t.kind==='transfer'){
    const fromAcc = financeState.accounts.find(a=>a.id===t.accountId);
    const toAcc = financeState.accounts.find(a=>a.id===t.toAccountId);
    if(fromAcc) fromAcc.amount += t.amount;
    if(toAcc) toAcc.amount -= t.amount;
  } else {
    const acc = financeState.accounts.find(a=>a.id===t.accountId);
    if(acc) acc.amount += (t.kind==='expense'?t.amount:-t.amount);
  }
  const taggedItems = getTxnGroceryItems(t);
  if(taggedItems.length){
    const idsToRemove = taggedItems.map(p=>p.groceryReminderId).filter(Boolean);
    if(idsToRemove.length){
      groceryReminders = groceryReminders.filter(g=>!idsToRemove.includes(g.id));
      saveGroceryRem();
    }
  }
  if(t.linkedShoppingId){
    const shopItem = shoppingList.find(s=>s.id===t.linkedShoppingId);
    if(shopItem) shopItem.linkedTransactionId = null;
    saveShoppingList();
  }
  financeState.transactions = financeState.transactions.filter(x=>x.id!==id);
  saveFinance(); closeAllModals(); renderFinTopbar(); renderFinContent();
  showToast('Transaction deleted');
}

/* ---------- Accounts ---------- */
function openAccountForm(existing){
  const isEdit = !!existing;
  const a = existing || {name:'', type:'Default', currency:config.currency, amount:0, icon:ACCOUNT_ICONS[0], excluded:false};
  openModal(`
    <div class="dialog-header"><button class="txt-btn" onclick="closeTopModal()">Cancel</button><h2>${isEdit?'Edit Account':'Add Account'}</h2><button class="txt-btn" style="font-weight:800;" onclick="saveAccount(${isEdit?`'${a.id}'`:'null'})">Save</button></div>
    <div class="field" style="margin:16px;"><label>Account name</label><input id="accName" type="text" placeholder="Enter account name" value="${escapeHtml(a.name)}"></div>
    <div class="field" style="margin:14px 16px;"><label>Type</label><select id="accType">${['Default','Cash','Bank','Credit Card','Savings','Investment'].map(t=>`<option ${t===a.type?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="field" style="margin:14px 16px;"><label>Currency</label><select id="accCurrency">${CURRENCIES.map(c=>`<option value="${c.code}" ${c.code===a.currency?'selected':''}>${c.code} ( ${c.sym} ) ${c.name}</option>`).join('')}</select></div>
    <div class="field" style="margin:14px 16px;"><label>Amount</label><input id="accAmount" type="number" value="${a.amount}"></div>
    <div class="field" style="margin:14px 16px;"><label>Icon</label><div class="icon-picker">${ACCOUNT_ICONS.map(ic=>`<button type="button" class="ip-cell ${ic===a.icon?'selected':''}" data-icon="${ic}" onclick="selectAccIcon(this)">${ic}</button>`).join('')}</div></div>
    ${isEdit?`<div style="margin:14px 16px 26px;"><button class="save-btn danger-btn" style="width:100%;margin:0;" onclick="deleteAccount('${a.id}')">Delete Account</button></div>`:'<div style="height:16px"></div>'}
  `);
}
function selectAccIcon(btn){ btn.parentElement.querySelectorAll('.ip-cell').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); }
function saveAccount(id){
  const wrap = document.querySelector('#modal-root .overlay');
  const name = wrap.querySelector('#accName').value.trim()||'Account';
  const type = wrap.querySelector('#accType').value;
  const currency = wrap.querySelector('#accCurrency').value;
  const amount = parseFloat(wrap.querySelector('#accAmount').value)||0;
  const icon = wrap.querySelector('.ip-cell.selected')?.dataset.icon || ACCOUNT_ICONS[0];
  if(id){ Object.assign(financeState.accounts.find(a=>a.id===id), {name,type,currency,amount,icon}); }
  else { financeState.accounts.push({id:uid(), name, type, currency, amount, icon, excluded:false}); }
  saveFinance(); closeAllModals(); renderFinContent();
  showToast('Account saved');
}
function editAccount(id){ openAccountForm(financeState.accounts.find(a=>a.id===id)); }
function deleteAccount(id){
  if(financeState.accounts.length<=1){ showToast('You need at least one account'); return; }
  financeState.accounts = financeState.accounts.filter(a=>a.id!==id);
  financeState.transactions = financeState.transactions.filter(t=>t.accountId!==id && t.toAccountId!==id);
  saveFinance(); closeAllModals(); renderFinContent();
  showToast('Account deleted');
}

/* ---------- Budget ---------- */
function openBudgetEditor(){
  openModal(`
    <div class="dialog-header"><button class="txt-btn" onclick="closeTopModal()">Cancel</button><h2>Monthly Budget</h2><button class="txt-btn" style="font-weight:800;" onclick="saveBudget()">Save</button></div>
    <div class="field" style="margin:18px 16px;"><label>Budget amount</label><input id="budgetInput" type="number" value="${financeState.budget}"></div>

/* ---------- Calendar ---------- */
function openCalendar(){ const [y,mo]=currentMonth.split('-').map(Number); drawCalendar(y,mo); }
function drawCalendar(y,mo){
  const first = new Date(y,mo-1,1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y,mo,0).getDate();
  const dayTotals = {};
  financeState.transactions.forEach(t=>{
    if(t.kind==='expense' && t.date.slice(0,7)===`${y}-${String(mo).padStart(2,'0')}`){
      const day = parseInt(t.date.slice(8,10)); dayTotals[day]=(dayTotals[day]||0)+t.amount;
    }
  });
  const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cells = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell empty"></div>`;
  const isCurMonth = monthKey(new Date())===`${y}-${String(mo).padStart(2,'0')}`;
  for(let d=1; d<=daysInMonth; d++){
    const isToday = isCurMonth && d===new Date().getDate();
    cells += `<div class="cal-cell ${isToday?'today':''}" onclick="calDayPick(${y},${mo})">${d}${dayTotals[d]?`<div class="amt">${dayTotals[d].toLocaleString()}</div>`:''}</div>`;
  }
  openModal(`
    <div class="dialog-header"><button class="txt-btn" onclick="shiftCal(${y},${mo},-1)">‹</button><h2>${first.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h2><button class="txt-btn" onclick="shiftCal(${y},${mo},1)">›</button></div>
    <div class="cal-grid">${cells}</div>
    <div style="text-align:center;padding-bottom:20px;"><button class="txt-btn" style="color:var(--primary-dark);font-weight:700;" onclick="closeTopModal()">Close</button></div>
  `);
}
function shiftCal(y,mo,delta){ closeTopModal(); let d=new Date(y,mo-1+delta,1); setTimeout(()=>drawCalendar(d.getFullYear(), d.getMonth()+1), 200); }
function calDayPick(y,mo){ currentMonth = `${y}-${String(mo).padStart(2,'0')}`; closeAllModals(); renderFinTopbar(); renderFinContent(); }

/* ---------- Import / Scan transactions directly into Finance Tracker ---------- */
/* Reuses the same lazy-loaded Excel/PDF/OCR engines as List to Buy (see
   ensureXlsxLibLoaded / ensurePdfLibLoaded / ensureOcrLibLoaded below) —
   CSV/TXT always works offline; Excel, PDF, and photo scans need internet
   the first time to fetch their reader/recognition engine. */
function normalizeDateStr(s){
  s = (s||'').trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if(m){
    let [,d,mo,y] = m;
    if(y.length===2) y = (parseInt(y,10)>50?'19':'20')+y;
    return y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  }
  return null;
}
function parseTransactionText(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const rows = [];
  lines.forEach(line=>{
    const lower = line.toLowerCase();
    if(/^date\b/.test(lower) && lower.includes('amount')) return; // header row
    if(/^[A-Z\s\/&(),.-]+$/.test(line) && !/\d/.test(line) && line.replace(/\s/g,'').length>3) return; // ALL-CAPS section header

    let parts = null;
    if(line.includes('\t')) parts = line.split('\t');
    else if(line.includes(',')) parts = line.split(',');

    let date=null, kind=null, category='', amount='', note='';
    if(parts && parts.length>=2){
      parts = parts.map(p=>p.trim()).filter(p=>p!=='');
      const leftover = [];
      parts.forEach(p=>{
        const d = normalizeDateStr(p);
        if(d && !date){ date=d; return; }
        if(/^(expense|debit|dr|spent|paid)$/i.test(p)){ kind='expense'; return; }
        if(/^(income|credit|cr|received|earned)$/i.test(p)){ kind='income'; return; }
        if(!amount){
          const priceInfo = extractPrice(p);
          if(priceInfo.price){ amount = priceInfo.price; if(priceInfo.rest) leftover.push(priceInfo.rest); return; }
          if(/^-?\d+(\.\d+)?$/.test(p)){ amount = Math.abs(parseFloat(p)); if(parseFloat(p)<0) kind = kind||'expense'; return; }
        }
        leftover.push(p);
      });
      if(leftover.length){ category = leftover[0]; note = leftover.slice(1).join(' '); }
    } else {
      const priceInfo = extractPrice(line);
      if(priceInfo.price){ amount = priceInfo.price; note = priceInfo.rest.trim(); }
    }
    if(amount){ rows.push({date: date||todayStr(), kind: kind||'expense', category: category||'Others', amount, note}); }
  });
  return rows;
}
async function parseTransactionsFromExcel(file){
  await ensureXlsxLibLoaded();
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, {type:'array'});
  let allText = '';
  wb.SheetNames.forEach(name=>{ allText += XLSX.utils.sheet_to_csv(wb.Sheets[name]) + '\n'; });
  return parseTransactionText(allText);
}
async function parseTransactionsFromPdf(file){
  await ensurePdfLibLoaded();
  const buf = await file.arrayBuffer();
  const doc = await pdfjsLib.getDocument({data:buf}).promise;
  let allLines = [];
  for(let i=1;i<=doc.numPages;i++){
    const page = await doc.getPage(i);
    const content = await page.getTextContent();
    const items = content.items.map(it=>({str:it.str, x:it.transform[4], y:it.transform[5]}));
    items.sort((a,b)=> b.y-a.y || a.x-b.x);
    let lines=[], currentY=null, currentLine=[];
    items.forEach(it=>{
      if(currentY===null || Math.abs(it.y-currentY)>3){ if(currentLine.length) lines.push(currentLine.map(s=>s.str).join(' ')); currentLine=[it]; currentY=it.y; }
      else currentLine.push(it);
    });
    if(currentLine.length) lines.push(currentLine.map(s=>s.str).join(' '));
    allLines = allLines.concat(lines);
  }
  let rows = parseTransactionText(allLines.join('\n'));
  if(rows.length===0 && doc.numPages>0){
    await ensureOcrLibLoaded();
    const page = await doc.getPage(1);
    const viewport = page.getViewport({scale:2});
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({canvasContext:ctx, viewport}).promise;
    const result = await Tesseract.recognize(canvas.toDataURL('image/png'), 'eng');
    rows = parseTransactionText((result && result.data && result.data.text) || '');
  }
  return rows;
}
function triggerFinImportFile(){ document.getElementById('finImportInput').click(); }
function handleFinImportFile(file){
  if(!file) return;
  const name = (file.name||'').toLowerCase();
  const type = file.type||'';
  document.getElementById('finImportInput').value = '';
  if(type.startsWith('image/') || /\.(png|jpe?g|webp)$/i.test(name)){
    const reader = new FileReader();
    reader.onload = (e)=>{ finScanImageDataUrl = e.target.result; openFinScanPreviewModal(); };
    reader.readAsDataURL(file);
    return;
  }
  if(/\.(xlsx|xls)$/i.test(name)){
    showToast('Reading spreadsheet…');
    parseTransactionsFromExcel(file).then(rows=>{
      if(rows.length===0){ showToast('No transactions found in that spreadsheet'); return; }
      openTxnImportReviewModal(rows);
    }).catch(()=> showToast('Could not read the spreadsheet — needs internet the first time. Try again, or use CSV instead.'));
    return;
  }
  if(/\.pdf$/i.test(name)){
    showToast('Reading PDF…');
    parseTransactionsFromPdf(file).then(rows=>{
      if(rows.length===0){ showToast('No transactions found in that PDF'); return; }
      openTxnImportReviewModal(rows);
    }).catch(()=> showToast('Could not read the PDF — needs internet the first time. Try again, or use CSV instead.'));
    return;
  }
  const reader = new FileReader();
  reader.onload = (e)=>{
    const rows = parseTransactionText(String(e.target.result||''));
    if(rows.length===0){ showToast('No transactions found in that file'); return; }
    openTxnImportReviewModal(rows);
  };
  reader.readAsText(file);
}
let finScanImageDataUrl = null;
function triggerFinScanFile(){ document.getElementById('finScanInput').click(); }
function handleFinScanFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{ finScanImageDataUrl = e.target.result; document.getElementById('finScanInput').value=''; openFinScanPreviewModal(); };

}
function openFinScanPreviewModal(){
  openModal(`

      <p style="font-size:12.5px;color:var(--muted);margin:0 0 12px;">Text recognition needs internet the first time to load its engine. Works best on printed receipts/statements — handwriting accuracy is limited, so review the amounts before adding.</p>
      <div id="finScanStatus" style="font-size:13px;color:var(--muted);margin-bottom:10px;min-height:18px;"></div>

async function runOcrForFinance(){
  const statusEl = document.getElementById('finScanStatus');
  const btn = document.getElementById('finScanExtractBtn');
  if(btn) btn.disabled = true;
  if(statusEl) statusEl.textContent = 'Loading recognition engine…';
  try{
    await ensureOcrLibLoaded();
    if(statusEl) statusEl.textContent = 'Reading text from the image… this can take a moment.';
    const result = await Tesseract.recognize(finScanImageDataUrl, 'eng');
    const text = (result && result.data && result.data.text) ? result.data.text : '';
    const rows = parseTransactionText(text);
    closeAllModals();
    if(rows.length===0){ showToast('No transactions recognized — try Import Transactions instead, or add manually'); return; }
    openTxnImportReviewModal(rows);
  }catch(err){
    if(statusEl) statusEl.textContent = '';
    showToast('Could not load text recognition (no internet?) — try Import Transactions instead.');
    if(btn) btn.disabled = false;
  }
}

/* ---------- Review step before committing imported/scanned transactions ---------- */
let txnReviewRows = [];
function openTxnImportReviewModal(rows){
  txnReviewRows = rows.map(r=>{
    const kind = r.kind==='income' ? 'income' : 'expense';
    const cats = kind==='income' ? INCOME_CATS : EXPENSE_CATS;
    const guessedCat = cats.find(c=>c.name.toLowerCase()===String(r.category||'').toLowerCase());
    const note = guessedCat ? (r.note||'') : [r.category, r.note].filter(Boolean).join(' ').trim();
    return { id:uid(), date: normalizeDateStr(r.date)||r.date||todayStr(), kind, category: guessedCat?guessedCat.name:cats[cats.length-1].name, amount:r.amount||'', note };
  });
  openModal('');
  drawTxnImportReviewModal();
}
function drawTxnImportReviewModal(){
  const wrap = document.querySelector('#modal-root .overlay');
  const dlg = wrap.querySelector('.dialog');
  const rowsHtml = txnReviewRows.map(r=>{
    const cats = r.kind==='income' ? INCOME_CATS : EXPENSE_CATS;
    return `<tr>
      <td><input type="date" value="${r.date}" style="width:130px;" onchange="updateTxnReviewRow('${r.id}','date',this.value)"></td>
      <td><select onchange="updateTxnReviewRow('${r.id}','kind',this.value)">
        <option value="expense" ${r.kind==='expense'?'selected':''}>Expense</option>
        <option value="income" ${r.kind==='income'?'selected':''}>Income</option>
      </select></td>
      <td><select onchange="updateTxnReviewRow('${r.id}','category',this.value)">${cats.map(c=>`<option value="${c.name}" ${c.name===r.category?'selected':''}>${c.icon} ${c.name}</option>`).join('')}</select></td>
      <td><input type="number" step="0.01" value="${escapeHtml(String(r.amount))}" style="width:85px;" onchange="updateTxnReviewRow('${r.id}','amount',this.value)"></td>
      <td><input type="text" value="${escapeHtml(r.note)}" style="width:140px;" onchange="updateTxnReviewRow('${r.id}','note',this.value)"></td>
      <td><button class="icon-x" onclick="removeTxnReviewRow('${r.id}')">✕</button></td>
    </tr>`;
  }).join('');
  dlg.innerHTML = `
    <div class="dialog-header"><button class="txt-btn" onclick="closeTopModal()">Cancel</button><h2>Review Transactions</h2><button class="txt-btn" style="font-weight:800;" onclick="proceedFromTxnReview()">Add All (${txnReviewRows.length})</button></div>
    <div style="padding:14px 16px;overflow-x:auto;">
      <p style="font-size:12.5px;color:var(--muted);margin:0 0 10px;">Review and fix anything before adding — dates, categories, and amounts are all editable.</p>
      <table class="shop-table" style="min-width:640px;">
        <thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Amount</th><th>Note</th><th></th></tr></thead>
        <tbody>${rowsHtml || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;">No rows left</td></tr>'}</tbody>
      </table>
    </div>
  `;
}
function updateTxnReviewRow(id, field, val){
  const r=txnReviewRows.find(x=>x.id===id); if(!r) return;
  r[field]=val;
  if(field==='kind'){
    const cats = val==='income' ? INCOME_CATS : EXPENSE_CATS;
    if(!cats.find(c=>c.name===r.category)) r.category = cats[cats.length-1].name;
    drawTxnImportReviewModal();
  }
}
function removeTxnReviewRow(id){ txnReviewRows = txnReviewRows.filter(x=>x.id!==id); drawTxnImportReviewModal(); }

/* Before actually committing the reviewed rows, scan each one for a likely
   perishable item (matched against the same grocery category data used
   elsewhere) and, if any are found, ask the customer whether to also track
   them in Grocery Expiry Reminder — showing the total expense amount for
   context. If nothing perishable is detected, skip straight to saving. */
let pendingPerishableMatches = [];
function proceedFromTxnReview(){
  const matches = [];
  txnReviewRows.forEach(r=>{
    const amount = parseFloat(r.amount)||0;
    if(amount<=0) return;
    const combined = (r.category||'') + ' ' + (r.note||'');
    const m = findPerishableMatch(combined);
    if(m) matches.push({rowId:r.id, matchedName:m.matchedName, category:m.category, icon:m.icon, checked:true, expiryDate: addDays(todayStr(),3)});
  });
  if(matches.length===0){ confirmTxnImportRows(); return; }
  pendingPerishableMatches = matches;
  openPerishableImportReviewModal();
}
function openPerishableImportReviewModal(){
  openModal('');
  drawPerishableImportReviewModal();
}
function drawPerishableImportReviewModal(){
  const wrap = document.querySelector('#modal-root .overlay');
  const dlg = wrap.querySelector('.dialog');
  const total = txnReviewRows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const rowsHtml = pendingPerishableMatches.map(m=>`
    <tr>
      <td><input type="checkbox" ${m.checked?'checked':''} onchange="togglePerishableMatch('${m.rowId}', this.checked)"></td>
      <td>${m.icon} ${escapeHtml(m.matchedName)}</td>
      <td>${escapeHtml(m.category)}</td>
      <td><input type="date" value="${m.expiryDate}" ${m.checked?'':'disabled'} onchange="updatePerishableMatchExpiry('${m.rowId}', this.value)"></td>
    </tr>`).join('');
  dlg.innerHTML = `
    <div class="dialog-header"><h2>Perishable Items Found</h2><div style="width:1px"></div></div>
    <div style="padding:16px;">
      <div class="perishable-total-box">Total Expense: ${fmt(total)}</div>
      <p style="font-size:12.5px;color:var(--muted);margin:12px 0;">We noticed some perishable items in what you imported. Check the ones you'd like tracked in Grocery Expiry Reminder, and confirm an expiry date for each. Anything left unchecked will still be added to Finance Tracker as a normal expense.</p>
      <div style="overflow-x:auto;">
      <table class="shop-table">
        <thead><tr><th></th><th>Item</th><th>Category</th><th>Expiry Date</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      </div>
    </div>
    <div class="two-btn">
      <button class="btn-delete" onclick="skipPerishableAndCommit()">Skip — Just Add Expenses</button>
      <button class="btn-edit" onclick="confirmPerishableAndCommit()">Add Checked & Save</button>
    </div>
  `;
}
function togglePerishableMatch(rowId, checked){
  const m = pendingPerishableMatches.find(x=>x.rowId===rowId);
  if(m) m.checked = checked;
  drawPerishableImportReviewModal();
}
function updatePerishableMatchExpiry(rowId, val){
  const m = pendingPerishableMatches.find(x=>x.rowId===rowId);
  if(m) m.expiryDate = val;
}
function skipPerishableAndCommit(){
  closeAllModals();
  confirmTxnImportRows();
}
function confirmPerishableAndCommit(){
  const checked = pendingPerishableMatches.filter(m=>m.checked);
  for(const m of checked){ if(!m.expiryDate){ showToast('Please set an expiry date for '+m.matchedName); return; } }
  closeAllModals();
  confirmTxnImportRows(checked);
}
function confirmTxnImportRows(perishableSelections){
  let count = 0;
  let perishableCount = 0;
  const accountId = financeState.accounts[0]?.id;
  txnReviewRows.forEach(r=>{
    const amount = parseFloat(r.amount)||0;
    if(amount<=0) return;
    const kind = r.kind==='income' ? 'income' : 'expense';
    const txn = {id:uid(), kind, category:r.category||'Others', amount, date:r.date||todayStr(), time:new Date().toTimeString().slice(0,8), note:r.note||'', accountId};
    financeState.transactions.push(txn);
    const acc = financeState.accounts.find(a=>a.id===accountId);
    if(acc) acc.amount += (kind==='expense'?-amount:amount);
    count++;

    if(perishableSelections && perishableSelections.length){
      const match = perishableSelections.find(m=>m.rowId===r.id);
      if(match){
        const groc = {id:uid(), category:match.category, item:match.matchedName, icon:match.icon, expiryDate:match.expiryDate, quantity:'', note:'', timingMode:'default', customAlertTime:null, customOffsets:null, alarmDurationSec:null, addedDate:todayStr(), fromTransactionId:txn.id};
        groceryReminders.push(groc);
        txn.groceryItems = [{id:uid(), name:match.matchedName, category:match.category, icon:match.icon, expiryDate:match.expiryDate, groceryReminderId:groc.id}];
        perishableCount++;
      }
    }
  });
  if(perishableCount>0) saveGroceryRem();
  saveFinance();
  closeAllModals();
  renderFinTopbar(); renderFinContent();
  showToast(count+' transaction(s) added'+(perishableCount?`, ${perishableCount} perishable item(s) added to Grocery Expiry Reminder`:''));
}

/* ---------- Grocery Expiry Reminder ---------- */
function daysUntil(dateStr){
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr+'T00:00:00');
  return Math.round((d-today)/86400000);
}
function expiryStatus(dateStr){
  const days = daysUntil(dateStr);
  if(days<0) return {cls:'expired', label:'Expired '+Math.abs(days)+'d ago'};
  if(days===0) return {cls:'soon', label:'Expires today'};
  if(days<=3) return {cls:'soon', label:days+'d left'};
  return {cls:'fresh', label:days+'d left'};
}
