function drawGroceryList(){
  const term = (grocerySearchTerm||'').trim().toLowerCase();
  const items = groceryReminders.slice().filter(it=>!term || it.item.toLowerCase().includes(term) || it.category.toLowerCase().includes(term)).sort((a,b)=>a.expiryDate.localeCompare(b.expiryDate));
  const container = document.getElementById('groceryList');
  if(items.length===0){
    container.innerHTML = `<div class="card"><div class="empty-state"><div class="em-icon">🥦</div><div class="em-title">${term?'No matching items':'No grocery items tracked yet'}</div><div>${term?'':'Click "+ Add Grocery Item" to pick a category and set an expiry date.'}</div></div></div>`;
    return;
  }
  const groups = {expired:[], soon:[], fresh:[]};
  items.forEach(it=>{ groups[expiryStatus(it.expiryDate).cls].push(it); });
  const sectionLabels = {expired:'Expired', soon:'Expiring Soon', fresh:'Fresh'};
  let html = '<div class="card">';
  ['expired','soon','fresh'].forEach(key=>{
    if(groups[key].length===0) return;
    html += `<div class="groc-section-title">${sectionLabels[key]} (${groups[key].length})</div>`;
    groups[key].forEach(it=>{
      const st = expiryStatus(it.expiryDate);
      html += `<div class="rem-item" onclick="openGroceryDetails('${it.id}')" style="cursor:pointer;">
        <div class="ri-top">
          <div style="display:flex;align-items:center;gap:12px;">

            <div class="ri-meta">${new Date(it.expiryDate+'T00:00:00').toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'})}</div>
          </div>
        </div>
      </div>`;
    });
  });
  html += '</div>';
  container.innerHTML = html;
}

  if(timingMode==='custom'){

  } else {

function editGroceryItem(id){
  const it = groceryReminders.find(x=>x.id===id); if(!it) return;
  closeAllModals();
  groceryCtx = {category:it.category, item:it.item, icon:it.icon, expiryDate:it.expiryDate, quantity:it.quantity, note:it.note, timingMode:it.timingMode, customAlertTime:it.customAlertTime, customOffsets:it.customOffsets, alarmDurationSec:it.alarmDurationSec, editingId:it.id};
  const wrap = openModal('');
  drawGroceryStep3(wrap);
}
function deleteGroceryItem(id){
  const it = groceryReminders.find(x=>x.id===id);
  if(it && it.fromTransactionId){
    const t = financeState.transactions.find(x=>x.id===it.fromTransactionId);
    if(t){
      if(Array.isArray(t.groceryItems)){
        // Keep the item as a plain tag on the transaction (it's still true
        // the purchase included this item) but drop the now-deleted
        // reminder link and its expiry date.
        const tagged = t.groceryItems.find(p=>p.groceryReminderId===id);
        if(tagged){ tagged.groceryReminderId=null; tagged.expiryDate=''; saveFinance(); }
      } else if(t.perishableItems){
        t.perishableItems = t.perishableItems.filter(p=>p.groceryReminderId!==id);
        saveFinance();
      }
    }
  }
  if(it && it.linkedShoppingId){
    const shopItem = shoppingList.find(s=>s.id===it.linkedShoppingId);
    if(shopItem) shopItem.linkedGroceryId = null;
    saveShoppingList();
  }
  groceryReminders = groceryReminders.filter(x=>x.id!==id);
  saveGroceryRem();
  syncAlarmIfType('grocery', id);
  closeAllModals();
  drawGroceryList();
  showToast('Grocery item removed');
}

/* Looks for an existing (non-expired) grocery reminder that matches
   the item name the customer is about to add to the shopping list. */
function findMatchingGroceryReminder(name){
  const lower = name.trim().toLowerCase();
  if(!lower) return null;
  return groceryReminders.find(g => g.item.trim().toLowerCase()===lower && expiryStatus(g.expiryDate).cls!=='expired') || null;
}
function addShoppingItem(){
  const name = document.getElementById('shopName').value.trim();
  const qty = document.getElementById('shopQty').value.trim();
  const unit = document.getElementById('shopUnit').value;
  const price = document.getElementById('shopPrice').value.trim();
  const expiry = document.getElementById('shopExpiry').value;
  if(!name){ showToast('Enter an item name'); return; }
  const match = findMatchingGroceryReminder(name);
  if(match){
    const st = expiryStatus(match.expiryDate);
    openModal(`
      <div class="dialog-header"><h2>Already Tracked</h2><div style="width:1px"></div></div>
      <div style="padding:20px;">
        <p style="margin:0 0 12px;font-size:14.5px;">🔔 <b>${escapeHtml(match.item)}</b>${match.quantity?' ('+escapeHtml(match.quantity)+')':''} is already in your <b>Grocery Expiry Reminder</b> list — <span class="exp-badge ${st.cls}">${st.label}</span></div>
        <p style="margin:0;color:var(--muted);font-size:13.5px;">Do you still want to add it to your shopping list?</p>
      </div>
      <div class="two-btn">
        <button class="btn-edit" onclick="closeTopModal(); confirmAddShoppingItem('${escapeHtml(name).replace(/'/g,"\\'")}','${qty}','${unit}','${price}','${expiry}')">Yes, Add Anyway</button>
        <button class="btn-delete" onclick="closeTopModal()">No, Skip It</button>
      </div>
    `);
    return;
  }
  confirmAddShoppingItem(name, qty, unit, price, expiry);
}
function confirmAddShoppingItem(name, qty, unit, price, expiry){
  shoppingList.push({id:uid(), name, qty, unit, price: parseFloat(price)||0, expiry: expiry||'', bought:false, addedDate:todayStr(), linkedTransactionId:null, linkedGroceryId:null});
  saveShoppingList();
  ['shopName','shopQty','shopPrice','shopExpiry'].forEach(fid=>{ const el=document.getElementById(fid); if(el) el.value=''; });
  drawShoppingList();
  showToast('Added to your shopping list');
}

function drawShoppingList(){
  const container = document.getElementById('shopListBody');
  const term = (shoppingSearchTerm||'').trim().toLowerCase();
  const filtered = shoppingList.filter(it=>!term || it.name.toLowerCase().includes(term));

    container.innerHTML = `<div class="card"><div class="empty-state"><div class="em-icon">📝</div><div class="em-title">Your shopping list is empty</div><div>Add items above, or import/scan a list to start planning your next shop.</div></div></div>`;

        <select class="shop-inline-input" style="width:76px;" onchange="updateShoppingField('${item.id}','unit',this.value)">${unitOptions.map(u=>`<option value="${u}" ${item.unit===u?'selected':''}>${u}</option>`).join('')}</select>
      </td>
      <td><input type="number" min="0" step="0.01" class="shop-inline-input" style="width:70px;" value="${item.price||''}" placeholder="—" onchange="updateShoppingField('${item.id}','price',parseFloat(this.value)||0)"></td>
      <td><input type="date" class="shop-inline-input" value="${item.expiry||''}" onchange="updateShoppingField('${item.id}','expiry',this.value)"></td>
      <td><button class="shop-bought-btn" onclick="toggleShoppingBought('${item.id}')" title="Toggle bought">${item.bought?'✓':''}</button></td>
      <td><button class="shop-act-btn ${item.linkedTransactionId?'done':''}" onclick="reflectToFinance('${item.id}')" title="${item.linkedTransactionId?'Already in Finance Tracker':'Add to Finance Tracker'}">${item.linkedTransactionId?'✓ 💰':'💰'}</button></td>
      <td><button class="shop-act-btn ${item.linkedGroceryId?'done':''}" onclick="reflectToGrocery('${item.id}')" title="${item.linkedGroceryId?'Already in Grocery Expiry Reminder':'Add to Grocery Expiry Reminder'}">${item.linkedGroceryId?'✓ 🥦':'🥦'}</button></td>
      <td><button class="icon-x" onclick="deleteShoppingItem('${item.id}')" title="Delete">✕</button></td>
    </tr>`;
  }).join('');
  container.innerHTML = `<div class="card">
    <div class="admin-actions" style="margin-bottom:12px;">
      <button class="btn-outline" onclick="bulkReflectToFinance()">💰 Add Selected to Finance</button>

    </div>

/* ---------- Import from a document (txt, csv, Excel, PDF, or an image) ---------- */
function triggerImportFile(){ document.getElementById('shopImportInput').click(); }

/* Pulls a handwritten/printed price out of a line, e.g. "Rice 5kg Rs.250"
   or "Turmeric 100gm ₹40", and returns the remaining text to parse further. */
function extractPrice(line){
  let m = line.match(/(?:₹|rs\.?|inr\.?|\$)\s*(\d+(\.\d+)?)/i);
  if(!m) m = line.match(/(\d+(\.\d+)?)\s*(?:₹|rs\.?|inr\.?|\$)/i);
  if(m) return {price: m[1], rest: line.replace(m[0],'').trim()};
  return {price:'', rest: line};
}
function normalizeUnitWord(u){
  u = (u||'').toLowerCase().trim();
  if(/^(kgs?|kilograms?)$/.test(u)) return 'kg';
  if(/^(gms?|grams?|g)$/.test(u)) return 'g';
  if(/^mls?$/.test(u)) return 'ml';
  if(/^(ltrs?|litres?|liters?|l)$/.test(u)) return 'l';
  if(/^(packets?|pkts?)$/.test(u)) return 'packet';
  if(/^dozens?$/.test(u)) return 'dozen';
  return 'pcs';
}
const UNIT_WORD_RE = '(?:kgs?|kilograms?|gms?|grams?|g|mls?|ltrs?|litres?|liters?|l|pcs?|pieces?|pc|packets?|pkts?|dozens?)';
/* Extracts a quantity (kept as free text — handles "1/2", "5-7", plain
   numbers, etc.) and a normalized unit from a string like "100 gm". */
function extractQtyUnit(str){
  str = (str||'').trim();
  if(!str) return {qty:'', unit:'pcs'};
  const re = new RegExp('^([\\d.\\/\\-\\s]+)\\s*(' + UNIT_WORD_RE + ')?\\b', 'i');
  const m = str.match(re);
  if(m && m[1] && m[1].trim()){
    return {qty: m[1].trim(), unit: normalizeUnitWord(m[2])};
  }
  return {qty:'', unit:'pcs'};
}
/* Best-effort line parser shared by text/CSV import, PDF text, and OCR
   output. Skips obvious section-header lines (all caps, no digits). */
function parseListText(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const rows = lines.map(line=>{
    if(/^[A-Z\s\/&(),.-]+$/.test(line) && !/\d/.test(line) && line.replace(/\s/g,'').length>3) return null;
    if(/^(item|name)s?$/i.test(line) || /^quantity$/i.test(line)) return null;

    const priceInfo = extractPrice(line);
    let working = priceInfo.rest;

    if(working.includes(',')){
      const parts = working.split(',').map(p=>p.trim());
      const qu = extractQtyUnit(parts[1]||'');
      return {
        name: parts[0]||'',
        qty: qu.qty || parts[1] || '',
        unit: parts[2] ? normalizeUnitWord(parts[2]) : (qu.unit||'pcs'),
        price: priceInfo.price || parts[3] || '',
        expiry: parts[4] || ''
      };
    }
    if(working.includes('\t') || working.includes('|')){
      const parts = working.split(/\t+|\|+/).map(p=>p.trim()).filter(Boolean);
      if(parts.length>=2){
        const qu = extractQtyUnit(parts[1]);
        return {name:parts[0], qty:qu.qty||parts[1], unit:qu.unit, price:priceInfo.price, expiry:''};
      }
    }
    const trailRe = new RegExp('^(.*?)[\\s,-]+([\\d.\\/\\-]+\\s*' + UNIT_WORD_RE + ')\\s*$', 'i');
    const trailMatch = working.match(trailRe);
    if(trailMatch){
      const qu = extractQtyUnit(trailMatch[2]);
      return {name:trailMatch[1].trim(), qty:qu.qty, unit:qu.unit, price:priceInfo.price, expiry:''};
    }
    return {name:working.trim(), qty:'', unit:'pcs', price:priceInfo.price, expiry:''};
  });
  return rows.filter(r=>r && r.name && r.name.length>1);
}
function handleImportFile(file){
  if(!file) return;
  const name = (file.name||'').toLowerCase();
  const type = file.type||'';
  document.getElementById('shopImportInput').value = '';
  currentImportLabel = 'Imported Items';

  if(type.startsWith('image/') || /\.(png|jpe?g|webp)$/i.test(name)){
    const reader = new FileReader();
    reader.onload = (e)=>{ currentScanImageDataUrl = e.target.result; openScanPreviewModal(); };
    reader.readAsDataURL(file);
    return;
  }
  if(/\.(xlsx|xls)$/i.test(name)){
    showToast('Reading spreadsheet…');
    parseExcelFile(file).then(rows=>{
      if(rows.length===0){ showToast('No items found in that spreadsheet'); return; }
      openImportReviewModal(rows);
    }).catch(()=> showToast('Could not read the spreadsheet — needs internet the first time. Try again, or use a text/CSV file instead.'));
    return;
  }
  if(/\.pdf$/i.test(name)){
    showToast('Reading PDF…');
    parsePdfFile(file).then(rows=>{
      if(rows.length===0){ showToast('No items found in that PDF'); return; }
      openImportReviewModal(rows);
    }).catch(()=> showToast('Could not read the PDF — needs internet the first time. Try again, or use a text/CSV file instead.'));
    return;
  }
  const reader = new FileReader();
  reader.onload = (e)=>{
    const rows = parseListText(String(e.target.result||''));
    if(rows.length===0){ showToast('No items found in that file'); return; }
    openImportReviewModal(rows);
  };
  reader.readAsText(file);
}

/* ---------- Excel (.xlsx/.xls) — lazy-loaded, needs internet the first time ---------- */
function ensureXlsxLibLoaded(){
  return new Promise((resolve, reject)=>{
    if(typeof XLSX!=='undefined'){ resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    script.onload = ()=>resolve();
    script.onerror = ()=>reject(new Error('Failed to load spreadsheet library'));
    document.head.appendChild(script);
  });
}
async function parseExcelFile(file){
  await ensureXlsxLibLoaded();
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, {type:'array'});
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rawRows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
  const results = [];
  rawRows.forEach(row=>{
    const first = String(row[0]||'').trim();
    const second = String(row[1]||'').trim();
    const third = String(row[2]||'').trim();
    if(!first) return;
    if(/^(item|name)s?$/i.test(first) && /^quant/i.test(second)) return;
    if(!second && !/\d/.test(first)) return; // section header row (e.g. "GRAINS/FLOURS") — skip
    const combined = second + (third?(' '+third):'');
    const priceInfo = extractPrice(combined || first);
    const qu = extractQtyUnit(priceInfo.rest || second);
    results.push({ name:first, qty: qu.qty || second || '', unit: qu.unit||'pcs', price: priceInfo.price||'', expiry:'' });
  });
  return results;
}

/* ---------- PDF — lazy-loaded, needs internet the first time ---------- */
function ensurePdfLibLoaded(){
  return new Promise((resolve, reject)=>{
    if(typeof pdfjsLib!=='undefined'){ resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    script.onload = ()=>{
      try{ pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }catch(e){}
      resolve();
    };
    script.onerror = ()=>reject(new Error('Failed to load PDF library'));
    document.head.appendChild(script);
  });
}
async function parsePdfFile(file){
  await ensurePdfLibLoaded();
  const buf = await file.arrayBuffer();
  const doc = await pdfjsLib.getDocument({data:buf}).promise;
  let allLines = [];
  for(let i=1;i<=doc.numPages;i++){
    const page = await doc.getPage(i);
    const content = await page.getTextContent();
    const items = content.items.map(it=>({str:it.str, x:it.transform[4], y:it.transform[5]}));
    items.sort((a,b)=> b.y-a.y || a.x-b.x);
    let lines = [], currentY = null, currentLine = [];
    items.forEach(it=>{
      if(currentY===null || Math.abs(it.y-currentY)>3){
        if(currentLine.length) lines.push(currentLine.map(s=>s.str).join(' '));
        currentLine = [it]; currentY = it.y;
      } else {
        currentLine.push(it);
      }
    });
    if(currentLine.length) lines.push(currentLine.map(s=>s.str).join(' '));
    allLines = allLines.concat(lines);
  }
  return parseListText(allLines.join('\n'));
}

/* ============================================================
   ================  ALARM & NOTIFICATION SYSTEM  ================
   ------------------------------------------------------------
   Runs entirely in the browser while this page is open (there is
   no server / push service behind this file), checking every 20
   seconds whether any medicine, expense, or grocery reminder has
   reached its scheduled alert time. When one is due it plays a
   looping alarm sound, shows a banner (and a system notification
   if permission was granted), and waits for the user to resolve
   it. Marking it done/paid/acknowledged stops the alarm and is
   saved immediately.
   ============================================================ */
function pad2(n){ return String(n).padStart(2,'0'); }
function hhmmNow(){ const d=new Date(); return pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function dateAtTime(dateStr, hhmm){ return new Date(dateStr+'T'+(hhmm||'09:00')+':00'); }
function addDays(dateStr, n){ const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function weekdayAbbrev(d){ return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }

function enableAlerts(){
  unlockAudio();
  try{
    if(typeof Notification!=='undefined' && Notification.permission!=='granted' && Notification.permission!=='denied'){
      Notification.requestPermission().then(p=>{ notifyPermissionGranted = (p==='granted'); updateBellBtn(); showToast(notifyPermissionGranted?'Alerts enabled':'Notifications blocked — sound alarms will still work'); }).catch(()=>{ showToast('Notifications unavailable — sound alarms will still work'); });
    } else {
      notifyPermissionGranted = (typeof Notification!=='undefined' && Notification.permission==='granted');
      showToast(audioUnlocked ? 'Alarm sound is enabled' : 'Click again after interacting with the page to unlock sound');
    }
  }catch(e){
    showToast('Notifications unavailable — sound alarms will still work');
  }
  updateBellBtn();
}
function updateBellBtn(){
  const b = document.getElementById('bellBtn');
  if(!b) return;
  b.classList.toggle('on', audioUnlocked || notifyPermissionGranted);
}
function unlockAudio(){
  const audio = document.getElementById('alarmAudio');
  if(!audio || audioUnlocked) return;
  audio.play().then(()=>{ audio.pause(); audio.currentTime=0; audioUnlocked=true; updateBellBtn(); }).catch(()=>{});
}
function playQuickBeep(){
  try{
    const src = document.getElementById('alarmAudio') && document.getElementById('alarmAudio').src;
    if(!src) return;
    const a = new Audio(src);
    a.volume = 0.6;
    a.play().catch(()=>{});
    setTimeout(()=>{ try{ a.pause(); }catch(e){} }, 500);
  }catch(e){}
}
document.addEventListener('click', function firstClickUnlock(){ unlockAudio(); }, {once:false});

function pruneDismissed(){
  const cutoff = addDays(todayStr(), -14);
  dismissedAlarms = dismissedAlarms.filter(k=>{
    const m = k.match(/(\d{4}-\d{2}-\d{2})/);
    return !m || m[1] >= cutoff;
  });
  saveDismissed();
}

/* Build the list of currently-due alarm instances across all three
   reminder types, skipping anything already dismissed, snoozed, or
   already resolved by the user. Each reminder can either use the
   admin panel's defaults or its own "Customize" overrides (time,
   how many days before, and how long the alarm rings for). */
function buildDueAlarms(){
  if(!config.alarmsEnabled) return [];
  const due = [];
  const now = new Date();
  const today = todayStr();

  if(config.features.medicineReminder){
    medReminders.forEach(m=>{
      const applies = m.freq==='weekly' ? (m.days||[]).includes(weekdayAbbrev(now)) : true;
      if(!applies) return;
      const useCustom = m.timingMode==='custom';
      const ringDurationSec = (useCustom && typeof m.alarmDurationSec==='number') ? m.alarmDurationSec : config.alarmDurationSec;
      (m.times||[]).forEach(slot=>{
        const key = `med:${m.id}:${today}:${slot}`;
        const already = (m.status[today]||{})[slot];
        if(already || dismissedAlarms.includes(key)) return;
        if(snoozeMap[key] && Date.now()<snoozeMap[key]) return;
        const timeStr = (useCustom && m.customTimes && m.customTimes[slot]) ? m.customTimes[slot] : (config.medicineTimes[slot]||'08:00');
        const target = dateAtTime(today, timeStr);
        if(now>=target) due.push({key, type:'medicine', id:m.id, slot, title:'💊 Time to take: '+m.name, sub:slot+' dose · tap Mark Done once taken', time:target, ringDurationSec});
      });
    });
  }
  if(config.features.expenseReminder){
    expenseReminders.forEach(r=>{
      if(r.paid) return;
      const useCustom = r.timingMode==='custom';
      const offsets = (useCustom && Array.isArray(r.customOffsets) && r.customOffsets.length) ? r.customOffsets : config.expenseOffsets;
      const alertTime = (useCustom && r.customAlertTime) ? r.customAlertTime : config.alertTime;
      const ringDurationSec = (useCustom && typeof r.alarmDurationSec==='number') ? r.alarmDurationSec : config.alarmDurationSec;
      const sorted = offsets.slice().sort((a,b)=>a-b); // most urgent (closest to due date) first
      for(const off of sorted){
        const triggerDate = addDays(r.date, -off);
        const key = `exp:${r.id}:${r.date}:${off}`;
        if(dismissedAlarms.includes(key)) continue;
        if(snoozeMap[key] && Date.now()<snoozeMap[key]) continue;
        const target = dateAtTime(triggerDate, alertTime);
        if(now>=target){
          const label = off===0 ? 'due today' : (off===1 ? 'due tomorrow' : `due in ${off} days`);
          due.push({key, type:'expense', id:r.id, title:'💳 '+r.name+' is '+label, sub:fmt(r.amount)+' · '+label, time:target, ringDurationSec});
          break;
        }
      }
    });
  }
  if(config.features.groceryExpiryReminder){
    groceryReminders.forEach(g=>{
      const useCustom = g.timingMode==='custom';
      const offsets = (useCustom && Array.isArray(g.customOffsets) && g.customOffsets.length) ? g.customOffsets : config.groceryOffsets;
      const alertTime = (useCustom && g.customAlertTime) ? g.customAlertTime : config.alertTime;
      const ringDurationSec = (useCustom && typeof g.alarmDurationSec==='number') ? g.alarmDurationSec : config.alarmDurationSec;
      const sorted = offsets.slice().sort((a,b)=>a-b);
      for(const off of sorted){
        const triggerDate = addDays(g.expiryDate, -off);
        const key = `groc:${g.id}:${g.expiryDate}:${off}`;
        if(dismissedAlarms.includes(key)) continue;
        if(snoozeMap[key] && Date.now()<snoozeMap[key]) continue;
        const target = dateAtTime(triggerDate, alertTime);
        if(now>=target){
          const label = off===0 ? 'expires today' : (off===1 ? 'expires tomorrow' : `expires in ${off} days`);
          due.push({key, type:'grocery', id:g.id, title:'🥦 '+g.item+' '+label, sub:g.category+(g.quantity?' · '+g.quantity:''), time:target, ringDurationSec});
          break;
        }
      }
    });
  }
  if(config.features.generalReminder){
    generalReminders.forEach(r=>{
      const ringDurationSec = typeof r.alarmDurationSec==='number' ? r.alarmDurationSec : config.alarmDurationSec;
      if(r.repeat==='none'){
        if(r.doneOnce) return;
        const key = `gen:${r.id}:${r.date}:once`;
        if(dismissedAlarms.includes(key)) return;
        if(snoozeMap[key] && Date.now()<snoozeMap[key]) return;
        const target = dateAtTime(r.date, r.time);
        if(now>=target) due.push({key, type:'general', id:r.id, title:'⏰ '+r.title, sub:r.note||'Tap Mark Done once handled', time:target, ringDurationSec});
      } else {
        const applies = r.repeat==='weekly' ? (r.days||[]).includes(weekdayAbbrev(now)) : true;
        if(!applies) return;
        if((r.status||{})[today]) return;
        const key = `gen:${r.id}:${today}:rep`;
        if(dismissedAlarms.includes(key)) return;
        if(snoozeMap[key] && Date.now()<snoozeMap[key]) return;
        const target = dateAtTime(today, r.time);
        if(now>=target) due.push({key, type:'general', id:r.id, title:'⏰ '+r.title, sub:r.note||'Tap Mark Done once handled', time:target, ringDurationSec});
      }
    });
  }
  due.sort((a,b)=>a.time-b.time);
  return due;
}

function checkReminders(){
  if(currentAlarm) return; // one at a time — resolve the active one first
  const due = buildDueAlarms();
  const next = due.find(d=>!alarmQueue.some(q=>q.key===d.key));
  if(next){ alarmQueue = due; showAlarm(next); }
}
let currentAlarmTimeoutId = null;
function showAlarm(alarm){
  currentAlarm = alarm;
  const audio = document.getElementById('alarmAudio');
  if(audio){ audio.currentTime=0; audio.play().catch(()=>{}); }
  if(notifyPermissionGranted){
    try{ new Notification(alarm.title, {body:alarm.sub, icon:'🔔'}); }catch(e){}
  }
  const actions = alarm.type==='medicine'
    ? `<button class="ab-btn-done" onclick="resolveAlarm('done')">✓ Mark Done</button><button class="ab-btn-snooze" onclick="resolveAlarm('snooze')">Snooze 10m</button>`
    : alarm.type==='expense'
    ? `<button class="ab-btn-done" onclick="resolveAlarm('done')">✓ Mark Paid</button><button class="ab-btn-snooze" onclick="resolveAlarm('snooze')">Snooze 10m</button>`
    : alarm.type==='general'
    ? `<button class="ab-btn-done" onclick="resolveAlarm('done')">✓ Mark Done</button><button class="ab-btn-snooze" onclick="resolveAlarm('snooze')">Snooze 10m</button>`
    : `<button class="ab-btn-done" onclick="resolveAlarm('done')">✓ Got it</button><button class="ab-btn-used" onclick="resolveAlarm('remove')">Mark Used</button><button class="ab-btn-snooze" onclick="resolveAlarm('snooze')">Snooze 10m</button>`;
  document.getElementById('alarm-banner-root').innerHTML = `
    <div class="alarm-banner">
      <div class="ab-ic">🔔</div>
      <div class="ab-body"><div class="ab-title">${escapeHtml(alarm.title)}</div><div class="ab-sub">${escapeHtml(alarm.sub)}</div></div>
      <div class="ab-actions">${actions}</div>
    </div>`;
  clearTimeout(currentAlarmTimeoutId);
  if(alarm.ringDurationSec>0){
    // If the customer set a ring duration and nobody responds in time,
    // stop the noise and quietly retry in 15 minutes instead of
    // ringing forever.
    currentAlarmTimeoutId = setTimeout(()=>{
      if(currentAlarm && currentAlarm.key===alarm.key){
        snoozeMap[alarm.key] = Date.now() + 15*60*1000;
        alarmQueue = alarmQueue.filter(q=>q.key!==alarm.key);
        currentAlarm = null;
        hideAlarmBanner();
        setTimeout(checkReminders, 500);
      }
    }, alarm.ringDurationSec*1000);
  }
}
function hideAlarmBanner(){
  const audio = document.getElementById('alarmAudio');
  if(audio){ audio.pause(); audio.currentTime=0; }
  document.getElementById('alarm-banner-root').innerHTML = '';
}
function resolveAlarm(action){
  if(!currentAlarm) return;
  const alarm = currentAlarm;
  clearTimeout(currentAlarmTimeoutId);
  if(action==='snooze'){
    snoozeMap[alarm.key] = Date.now() + 10*60*1000;
  } else if(action==='done'){
    dismissedAlarms.push(alarm.key); saveDismissed();
    if(alarm.type==='medicine'){
      const m = medReminders.find(x=>x.id===alarm.id);
      if(m){ const today=todayStr(); m.status[today]=m.status[today]||{}; m.status[today][alarm.slot]=true; saveMedRemState(); if(document.getElementById('view-medicineRem').classList.contains('active')) drawMedList(); }
    } else if(alarm.type==='expense'){
      const r = expenseReminders.find(x=>x.id===alarm.id);
      if(r){ r.paid=true; saveExpRem(); if(document.getElementById('view-expenseRem').classList.contains('active')) drawExpenseRemList(); }
    } else if(alarm.type==='grocery'){
      if(document.getElementById('view-groceryRem').classList.contains('active')) drawGroceryList();
    } else if(alarm.type==='general'){
      const r = generalReminders.find(x=>x.id===alarm.id);
      if(r){
        if(r.repeat==='none'){ r.doneOnce = true; } else { const today=todayStr(); r.status=r.status||{}; r.status[today]=true; }
        saveGeneralRem();
        if(document.getElementById('view-generalRem').classList.contains('active')) drawGeneralRemList();
      }
    }
  } else if(action==='remove' && alarm.type==='grocery'){
    dismissedAlarms.push(alarm.key); saveDismissed();
    deleteGroceryItem(alarm.id);
  }
  alarmQueue = alarmQueue.filter(q=>q.key!==alarm.key);
  currentAlarm = null;
  hideAlarmBanner();
  setTimeout(checkReminders, 400);
}
function startAlarmScheduler(){
  pruneDismissed();
  checkReminders();
  setInterval(checkReminders, 20000);
}
/* Called when a reminder is marked done/paid from its own screen
   (rather than from the alarm banner) — if that exact instance is
   the one currently alarming, stop the alarm immediately too. */
function syncAlarmIfMatches(key){
  dismissedAlarms.push(key); saveDismissed();
  if(currentAlarm && currentAlarm.key===key){
    clearTimeout(currentAlarmTimeoutId);
    alarmQueue = alarmQueue.filter(q=>q.key!==key);
    currentAlarm = null;
    hideAlarmBanner();
    setTimeout(checkReminders, 400);
  }
}
/* Like syncAlarmIfMatches, but matches by reminder type+id instead of
   an exact key — needed for expense/grocery reminders since their
   offsets (and therefore alarm keys) can now be customized per item,
   so we can't predict the exact key that might be showing. */
function syncAlarmIfType(type, id){
  if(currentAlarm && currentAlarm.type===type && currentAlarm.id===id){
    clearTimeout(currentAlarmTimeoutId);
    alarmQueue = alarmQueue.filter(q=>!(q.type===type && q.id===id));
    currentAlarm = null;
    hideAlarmBanner();
    setTimeout(checkReminders, 400);
  }
}

/* ============================================================
   ================  VOICE ASSISTANT  ============================
   ------------------------------------------------------------
   Uses the browser's built-in Web Speech API (SpeechRecognition) —
   no external library needed. Note: on most browsers this still
   sends audio to the browser vendor's speech-to-text servers to
   work at all, so it generally requires an internet connection
   even though no extra code is loaded for it. Understanding is
   simple keyword/pattern matching (not a full AI assistant): it
   recognizes short direct phrases and pre-fills the matching form
   for the customer to review and confirm, rather than silently
   auto-saving anything it might have misheard.
   ============================================================ */
let voiceRecognition = null;
let voiceListening = false;
function initVoiceAssistant(){
  const btn = document.getElementById('voiceFab');
  if(!btn) return;
  const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!config.features.voiceAssistant || !SpeechRecognitionCtor){
    btn.style.display = 'none';
    return;
  }
  btn.style.display = 'flex';
  if(voiceRecognition) return; // already initialized
  try{
    voiceRecognition = new SpeechRecognitionCtor();
    voiceRecognition.lang = 'en-US';
    voiceRecognition.continuous = false;
    voiceRecognition.interimResults = false;
    voiceRecognition.maxAlternatives = 1;
    voiceRecognition.onresult = (e)=>{ handleVoiceCommand(e.results[0][0].transcript); };
    voiceRecognition.onerror = (e)=>{
      setVoiceListening(false);
      showToast('Voice: '+(e.error==='not-allowed' ? 'microphone permission denied' : 'could not hear you, try again'));
    };
    voiceRecognition.onend = ()=>{ setVoiceListening(false); };
  }catch(e){
    btn.style.display = 'none';
  }
}
function toggleVoiceListening(){
  if(!voiceRecognition){ showToast('Voice assistant is not supported in this browser'); return; }
  if(voiceListening){ voiceRecognition.stop(); return; }
  try{
    voiceRecognition.start();
    setVoiceListening(true);
    showVoiceTranscript('Listening… try "add expense 200 for food", "add milk 2 kg to shopping list", or "remind me to call mom at 5 pm"');
  }catch(e){
    showToast('Could not start listening — try again');
  }
}
function setVoiceListening(on){
  voiceListening = on;
  const btn = document.getElementById('voiceFab');
  if(btn) btn.classList.toggle('listening', on);
  if(!on) setTimeout(hideVoiceTranscript, 3500);
}
function showVoiceTranscript(text){
  const el = document.getElementById('voiceTranscriptBubble');
  if(!el) return;
  el.textContent = text;
  el.classList.remove('hidden');
}
function hideVoiceTranscript(){
  const el = document.getElementById('voiceTranscriptBubble');
  if(el) el.classList.add('hidden');
}
function handleVoiceCommand(rawText){
  const text = (rawText||'').trim();
  const lower = text.toLowerCase();
  showVoiceTranscript('Heard: "'+text+'"');

  const amountMatch = lower.match(/(\d+(\.\d+)?)/);
  const isExpenseIntent = /\b(expense|spent|paid|bought|purchase|purchased)\b/.test(lower);
  const isIncomeIntent = /\b(income|received|earned|salary|got paid)\b/.test(lower);
  const isReminderIntent = /\b(remind me|reminder|alarm|wake me|meeting)\b/.test(lower);
  const isShoppingIntent = /\b(shopping list|to buy|add to( the| my)? list)\b/.test(lower);

  // 1) Expense / Income transaction
  if((isExpenseIntent || isIncomeIntent) && amountMatch){
    const amount = amountMatch[1];
    const kind = isIncomeIntent ? 'income' : 'expense';
    const cats = kind==='expense' ? EXPENSE_CATS : INCOME_CATS;
    const category = cats.find(c=>lower.includes(c.name.toLowerCase()));
    let note = text.replace(amountMatch[0],'')
      .replace(/\b(expense|spent|paid|bought|purchase|purchased|income|received|earned|salary|got paid|for|of|add|rupees?|dollars?|₹|\$)\b/gi,'')
      .replace(/\s+/g,' ').trim();
    if(!config.features.finance){ showToast('Personal Finance Tracker is turned off in Admin Panel'); return; }
    enterFinance();
    openAddTransaction(kind);
    pickCategory(category ? category.name : cats[cats.length-1].name);
    addCtx.amountStr = amount;
    addCtx.note = note;
    const numEl = document.getElementById('amountNum'); if(numEl) numEl.textContent = currencySymbol()+amount;
    const noteEl = document.getElementById('txnNote'); if(noteEl) noteEl.value = note;
    showToast('Review the amount & category, then tap Save');
    return;
  }

  // 2) Shopping list item
  if(isShoppingIntent || (!isExpenseIntent && !isIncomeIntent && !isReminderIntent && /\b(add|buy)\b/.test(lower))){
    if(!config.features.shoppingList){ showToast('List to Buy is turned off in Admin Panel'); return; }
    let clean = text.replace(/\b(add|to|the|my|shopping list|list|buy)\b/gi,'').replace(/\s+/g,' ').trim();
    const qtyMatch = clean.match(/(\d+(\.\d+)?)\s*(kg|g|grams?|kilograms?|pcs|pieces|pc)?/i);
    let qty='', unit='pcs', name=clean;
    if(qtyMatch){
      qty = qtyMatch[1];
      let u = (qtyMatch[3]||'pcs').toLowerCase();
      if(u.startsWith('kilo')) unit='kg'; else if(u.startsWith('gram')) unit='g'; else if(u.startsWith('pc')||u.startsWith('piece')) unit='pcs'; else if(u) unit=u;
      name = clean.replace(qtyMatch[0],'').trim();
    }
    if(!name){ showToast("Didn't catch the item name — please try again"); return; }
    enterShoppingList();
    const nameEl = document.getElementById('shopName'); if(nameEl) nameEl.value = name;
    const qtyEl = document.getElementById('shopQty'); if(qtyEl) qtyEl.value = qty;
    const unitEl = document.getElementById('shopUnit'); if(unitEl) unitEl.value = unit;
    showToast('Review the item, then tap "+ Add" to confirm');
    return;
  }

  // 3) General reminder (alarms, meetings, wake-ups, etc.)
  if(isReminderIntent){
    if(!config.features.generalReminder){ showToast('General Reminder is turned off in Admin Panel'); return; }
    let timeStr = '08:00';
    const timeMatch = lower.match(/\b(?:at|for)\s+(\d{1,2})(:(\d{2}))?\s*(am|pm)?\b/);
    let working = text;
    if(timeMatch){
      let hour = parseInt(timeMatch[1],10);
      const min = timeMatch[3] ? parseInt(timeMatch[3],10) : 0;
      const ampm = timeMatch[4];
      if(ampm==='pm' && hour<12) hour+=12;
      if(ampm==='am' && hour===12) hour=0;
      timeStr = pad2(hour)+':'+pad2(min);
      const re = new RegExp(timeMatch[0].replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'i');
      working = working.replace(re, '');
    }
    let title = working.replace(/\b(remind me to|remind me|reminder|set an? alarm|wake me( up)?|meeting)\b/gi,'').trim();
    title = title.replace(/^[\s,.\-]+|[\s,.\-]+$/g,'').trim();
    if(!title) title = 'Reminder';
    enterGeneralRem();
    const titleEl = document.getElementById('genTitle'); if(titleEl) titleEl.value = title;
    const timeEl = document.getElementById('genTime'); if(timeEl) timeEl.value = timeStr;
    showToast('Review and tap "+ Save Reminder" to confirm');
    return;
  }

  showToast('Didn\'t understand — try "add expense 200 for food", "add milk 2 kg to shopping list", or "remind me to call mom at 5 pm"');
}

          <div style="height:18px"></div>
          <div class="admin-danger">
            <h4>Danger Zone</h4>
            <p style="font-size:13px;color:var(--muted);margin:0 0 10px 0;">Permanently deletes all transactions, accounts, and reminders on this device.</p>
            <button class="btn-danger-outline" onclick="confirmResetAll()">Delete All Data</button>
          </div>
        </div>

      </div>
    </div>
  `;
}
function toggleRow(key,label,sub){
  return `<div class="toggle-row"><div><div class="tr-txt">${label}</div><div class="tr-sub">${sub}</div></div><button class="toggle ${config.features[key]?'on':''}" onclick="toggleFeature('${key}')"></button></div>`;
}
function toggleFeature(key){
  config.features[key] = !config.features[key];
  saveConfig();
  renderAdmin();
  if(key==='voiceAssistant') initVoiceAssistant();
  showToast((config.features[key]?'Enabled: ':'Disabled: ')+key);
}
function setTheme(key){ config.theme=key; saveConfig(); applyTheme(key); renderAdmin(); showToast('Theme applied: '+THEMES[key].label); }
function saveAppName(){ config.appName = document.getElementById('adminAppName').value.trim() || 'All-in-One Dashboard'; saveConfig(); document.getElementById('appNameLabel').textContent=config.appName; document.title=config.appName; showToast('App name saved'); }
function saveCurrency(){ config.currency = document.getElementById('adminCurrency').value; saveConfig(); showToast('Default currency saved'); }
function toggleAlarmsEnabled(){ config.alarmsEnabled = !config.alarmsEnabled; saveConfig(); renderAdmin(); showToast(config.alarmsEnabled?'Alarms enabled':'Alarms disabled'); if(!config.alarmsEnabled) hideAlarmBanner(); currentAlarm=null; }
function saveAlarmTimes(){
  config.medicineTimes = {
    Morning: document.getElementById('timeMorning').value || '08:00',
    Afternoon: document.getElementById('timeAfternoon').value || '13:00',
    Evening: document.getElementById('timeEvening').value || '19:00'
  };
  config.alertTime = document.getElementById('timeAlert').value || '09:00';
  const expOffsets = Array.from(document.querySelectorAll('.admin-exp-offset:checked')).map(c=>parseInt(c.value,10));
  const grocOffsets = Array.from(document.querySelectorAll('.admin-groc-offset:checked')).map(c=>parseInt(c.value,10));
  config.expenseOffsets = expOffsets.length ? expOffsets : DEFAULT_CONFIG.expenseOffsets.slice();
  config.groceryOffsets = grocOffsets.length ? grocOffsets : DEFAULT_CONFIG.groceryOffsets.slice();
  config.alarmDurationSec = parseInt(document.getElementById('adminAlarmDur').value,10) || 0;
  saveConfig();
  renderAdmin();
  showToast('Alarm settings saved');

function testAlarmSound(){
  unlockAudio();
  const audio = document.getElementById('alarmAudio');
  if(audio){ audio.currentTime=0; audio.play().catch(()=>showToast('Click anywhere on the page first, then try again')); setTimeout(()=>{ audio.pause(); audio.currentTime=0; }, 2500); }
}
function changeAdminPassword(){
  const p1 = document.getElementById('adminNewPw').value;
  const p2 = document.getElementById('adminNewPw2').value;
  if(!p1 || p1.length<4){ showToast('Password must be at least 4 characters'); return; }
  if(p1!==p2){ showToast('Passwords do not match'); return; }
  config.adminPassword = p1; saveConfig();
  document.getElementById('adminNewPw').value=''; document.getElementById('adminNewPw2').value='';
  showToast('Admin password updated');
}
function exportAllData(){
  const data = {config, financeState, expenseReminders, medReminders, groceryReminders, shoppingList, generalReminders, dismissedAlarms, exportedAt:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='all-in-one-dashboard-backup.json';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  showToast('Data exported');
}
function importAllData(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(data.config) config = mergeConfig(data.config);
      if(data.financeState){
        financeState = data.financeState;
        financeState.accounts = asArray(financeState.accounts);
        if(financeState.accounts.length===0) financeState.accounts.push({id:uid(), name:'Cash', type:'Default', currency:config.currency, amount:0, icon:'💵', excluded:false});
        financeState.transactions = asArray(financeState.transactions);
        if(typeof financeState.budget!=='number' || isNaN(financeState.budget)) financeState.budget = 0;
      }
      if(data.expenseReminders) expenseReminders = asArray(data.expenseReminders);
      if(data.medReminders) medReminders = asArray(data.medReminders);
      if(data.groceryReminders) groceryReminders = asArray(data.groceryReminders);
      if(data.shoppingList) shoppingList = asArray(data.shoppingList);
      if(data.generalReminders) generalReminders = asArray(data.generalReminders);
      if(data.dismissedAlarms) dismissedAlarms = asArray(data.dismissedAlarms);
      saveConfig(); saveFinance(); saveExpRem(); saveMedRemState(); saveGroceryRem(); saveShoppingList(); saveGeneralRem(); saveDismissed();
      applyTheme(config.theme);
      renderAdmin();
      showToast('Data imported successfully');
    }catch(err){ showToast('Invalid file — import failed'); }
  };
  reader.readAsText(file);
}
function confirmResetAll(){
  openModal(`
    <div class="dialog-header"><button class="txt-btn" onclick="closeTopModal()">Cancel</button><h2>Delete All Data</h2><div style="width:40px"></div></div>
    <div style="padding:20px;color:var(--muted);font-size:14px;">This permanently deletes all transactions, accounts, reminders, and your shopping list on this device. This cannot be undone.</div>
    <div class="two-btn"><button class="btn-edit" onclick="closeTopModal()">Cancel</button><button class="btn-delete" onclick="resetAllData()">Delete Everything</button></div>
  `);
}
function resetAllData(){
  financeState = {accounts:[{id:uid(), name:'Cash', type:'Default', currency:config.currency, amount:0, icon:'💵', excluded:false}], transactions:[], budget:0};
  expenseReminders = []; medReminders = []; groceryReminders = []; shoppingList = []; generalReminders = []; dismissedAlarms = []; snoozeMap = {};
  saveFinance(); saveExpRem(); saveMedRemState(); saveGroceryRem(); saveShoppingList(); saveGeneralRem(); saveDismissed();
  closeAllModals();
  renderAdmin();
  showToast('All data deleted');
}

/* ============================================================
   MODAL SYSTEM (centered dialog)
   ============================================================ */
function openModal(html){
  const root = document.getElementById('modal-root');
  const wrap = document.createElement('div');
  wrap.className = 'overlay';
  wrap.innerHTML = `<div class="dialog">${html}</div>`;
  wrap.addEventListener('click', e=>{ if(e.target===wrap) closeModal(wrap); });
  root.appendChild(wrap);
  requestAnimationFrame(()=>wrap.classList.add('show'));
  return wrap;
}
function closeModal(wrap){ wrap.classList.remove('show'); document.removeEventListener('keydown', kpKeyHandler); setTimeout(()=>wrap.remove(),180); }
function closeTopModal(){ const root=document.getElementById('modal-root'); const last=root.lastElementChild; if(last) closeModal(last); }
function closeAllModals(){ document.removeEventListener('keydown', kpKeyHandler); document.getElementById('modal-root').innerHTML=''; }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeTopModal(); });

/* ============================================================
   SUPABASE AUTH (Login / Sign up / Logout)
   Uses Supabase Auth REST API so it works inside Android WebView.
   ============================================================ */
const SUPABASE_URL = 'https://egbcgwqhwubiasiuxekr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_vFw0kUPqUu6LO-yrVX7gmg_FGd4UefX';
const ADMIN_EMAILS = ['g.ramkumar3127@gmail.com','lakshmankumar586@gmail.com'].map(e=>e.toLowerCase());
const AUTH_STORAGE_KEY = 'ft_supabase_session';

let authMode = 'login';
let authState = { session:null, user:null, profile:null, isAdmin:false };
let appBooted = false;

function authHeaders(extra){
  return Object.assign({
    'Content-Type':'application/json',
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + (authState.session && authState.session.access_token ? authState.session.access_token : SUPABASE_ANON_KEY)
  }, extra||{});
}
function loadStoredSession(){
  try{ return JSON.parse(localStorage.getItem(AUTH_STORAGE_KEY)||'null'); }catch(e){ return null; }
}
function saveStoredSession(session){
  if(session) localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(session));
  else localStorage.removeItem(AUTH_STORAGE_KEY);
}
function setAuthMode(mode){
  authMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode==='login');
  document.getElementById('tabSignup').classList.toggle('active', mode==='signup');
  document.getElementById('authNameField').style.display = mode==='signup' ? '' : 'none';
  document.getElementById('authTitle').textContent = mode==='login' ? 'Welcome back' : 'Create account';
  document.getElementById('authSub').textContent = mode==='login' ? 'Sign in to open your dashboard' : 'Sign up to start tracking money and reminders';
  document.getElementById('authSubmitBtn').textContent = mode==='login' ? 'Login' : 'Create account';
  document.getElementById('authError').classList.add('hidden');
  document.getElementById('authInfo').classList.add('hidden');
}
function showAuthError(msg){
  const el = document.getElementById('authError');
  el.textContent = msg||'Something went wrong';
  el.classList.remove('hidden');
  document.getElementById('authInfo').classList.add('hidden');
}
function showAuthInfo(msg){
  const el = document.getElementById('authInfo');
  el.textContent = msg||'';
  el.classList.remove('hidden');
  document.getElementById('authError').classList.add('hidden');
}
async function submitAuth(){
  const email = (document.getElementById('authEmail').value||'').trim();
  const password = document.getElementById('authPassword').value||'';
  const fullName = (document.getElementById('authName').value||'').trim() || email.split('@')[0];
  document.getElementById('authError').classList.add('hidden');
  document.getElementById('authInfo').classList.add('hidden');
  if(!email || !password){ showAuthError('Email and password are required.'); return; }
  const btn = document.getElementById('authSubmitBtn');
  btn.disabled = true; btn.textContent = 'Please wait…';
  try{
    if(authMode==='login'){
      const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
        method:'POST', headers:authHeaders(), body:JSON.stringify({email, password})
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error_description || data.msg || data.error || 'Login failed');
      await applySession(data);
      await bootAppIfReady();
    } else {
      if(password.length < 6) throw new Error('Password must be at least 6 characters.');
      const res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
        method:'POST', headers:authHeaders(),
        body:JSON.stringify({email, password, data:{full_name: fullName}})
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error_description || data.msg || data.error || 'Sign up failed');
      if(data.access_token){
        await applySession(data);
        await bootAppIfReady();
      } else {
        setAuthMode('login');
        showAuthInfo('Account created. If email confirmation is on, check your inbox, then log in.');
      }
    }
  }catch(err){
    showAuthError(err.message || String(err));
  }finally{
    btn.disabled = false;
    btn.textContent = authMode==='login' ? 'Login' : 'Create account';
  }
}
async function applySession(session){
  authState.session = session;
  saveStoredSession(session);
  const userRes = await fetch(SUPABASE_URL + '/auth/v1/user', { headers:authHeaders() });
  const user = await userRes.json();
  if(!userRes.ok) throw new Error(user.msg || user.error || 'Could not load user');
  authState.user = user;
  authState.profile = await fetchProfile(user.id);
  const email = (user.email||'').toLowerCase();
  authState.isAdmin = (authState.profile && authState.profile.role==='admin') || ADMIN_EMAILS.includes(email);
  updateAuthChrome();
}
async function fetchProfile(userId){
  try{
    const res = await fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + encodeURIComponent(userId) + '&select=id,email,full_name,role', {
      headers: Object.assign(authHeaders(), { 'Accept':'application/json' })
    });
    if(!res.ok) return null;
    const rows = await res.json();
    return Array.isArray(rows) && rows[0] ? rows[0] : null;
  }catch(e){ return null; }
}
function updateAuthChrome(){
  const chip = document.getElementById('userChip');
  const adminBtn = document.getElementById('adminBtn');
  if(authState.user){
    const label = (authState.profile && authState.profile.full_name) || authState.user.email || '';
    chip.textContent = authState.isAdmin ? (label + ' · Admin') : label;
    adminBtn.style.display = authState.isAdmin ? '' : 'none';
  } else {
    chip.textContent = '';
    adminBtn.style.display = 'none';
  }
}
function showAuthScreen(){
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('app-root').style.display = 'none';
  const fab = document.getElementById('voiceFab');
  if(fab) fab.style.display = 'none';
}
function hideAuthScreen(){
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('topbar').style.display = '';
  document.getElementById('app-root').style.display = '';
  const fab = document.getElementById('voiceFab');
  if(fab) fab.style.display = '';
}
async function logoutAuth(){
  try{
    if(authState.session && authState.session.access_token){
      await fetch(SUPABASE_URL + '/auth/v1/logout', { method:'POST', headers:authHeaders() });
    }
  }catch(e){}
  authState = { session:null, user:null, profile:null, isAdmin:false };
  adminAuthed = false;
  saveStoredSession(null);
  updateAuthChrome();
  showAuthScreen();
  setAuthMode('login');
}
async function restoreAuthSession(){
  const stored = loadStoredSession();
  if(!stored || !stored.access_token) return false;
  try{
    await applySession(stored);
    return true;
  }catch(e){
    saveStoredSession(null);
    authState = { session:null, user:null, profile:null, isAdmin:false };
    return false;
  }
}
function bootAppCore(){
  applyTheme(config.theme);
  renderDashboard();
  updateBellBtn();
  startAlarmScheduler();
  initVoiceAssistant();
  updateAuthChrome();
}
async function bootAppIfReady(){
  if(!authState.user){ showAuthScreen(); return; }
  hideAuthScreen();
  if(!appBooted){
    appBooted = true;
    bootAppCore();
  } else {
    updateAuthChrome();
  }
}

/* ============================================================
   INIT
   ============================================================ */
try{
  showAuthScreen();
  setAuthMode('login');
  restoreAuthSession().then(ok=>{
    if(ok) bootAppIfReady();
    else showAuthScreen();
  }).catch(()=>showAuthScreen());
}catch(e){
  console.error('Init error:', e);
  showAuthScreen();
  showAuthError((e && e.message) ? e.message : 'Startup error');
}
</script>
