<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker — Reminders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-active { background: #FBBF24; color: #1a1a1a; font-weight: 700; }
    .tab-inactive { background: white; color: #6b7280; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <!-- Header -->
  <div class="bg-yellow-400 px-6 pt-8 pb-5 flex items-center gap-3">
    <a href="dashboard.html" class="text-gray-800 text-xl">‹</a>
    <h1 class="text-xl font-extrabold text-gray-900">Reminders</h1>
  </div>

  <!-- Tabs -->
  <div class="bg-white border-b border-gray-100 px-4 py-2 flex gap-2">
    <button onclick="switchTab('bills')" id="tab-bills" class="px-4 py-2 rounded-xl text-sm tab-active">💳 Bills</button>
    <button onclick="switchTab('medicine')" id="tab-medicine" class="px-4 py-2 rounded-xl text-sm tab-inactive">💊 Medicine</button>
    <button onclick="switchTab('grocery')" id="tab-grocery" class="px-4 py-2 rounded-xl text-sm tab-inactive">🥦 Grocery</button>
  </div>

  <div class="p-4 max-w-lg mx-auto">

    <!-- Bills tab -->
    <div id="panel-bills">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-gray-800">Bill Reminders</h2>
        <button onclick="showForm('billForm')" class="text-sm bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold px-3 py-1 rounded-lg">+ Add</button>
      </div>
      <div id="billForm" class="hidden bg-white rounded-2xl shadow p-4 mb-3 space-y-3">
        <input id="billName" placeholder="Bill name (e.g. Electricity)" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        <input id="billAmount" type="number" step="0.01" placeholder="Amount" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Due date</label>
          <input id="billDue" type="date" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        </div>
        <div class="flex gap-2">
          <button onclick="addBill()" class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold py-2 rounded-xl text-sm">Save</button>
          <button onclick="hideForm('billForm')" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl text-sm">Cancel</button>
        </div>
      </div>
      <div id="billList" class="space-y-2"><p class="text-gray-400 text-sm">Loading…</p></div>
    </div>

    <!-- Medicine tab -->
    <div id="panel-medicine" class="hidden">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-gray-800">Medicine Reminders</h2>
        <button onclick="showForm('medForm')" class="text-sm bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold px-3 py-1 rounded-lg">+ Add</button>
      </div>
      <div id="medForm" class="hidden bg-white rounded-2xl shadow p-4 mb-3 space-y-3">
        <input id="medName" placeholder="Medicine name" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Start date</label>
          <input id="medStart" type="date" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block">End date (optional)</label>
          <input id="medEnd" type="date" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        </div>
        <div class="space-y-1">
          <p class="text-xs text-gray-500 font-semibold">Times</p>
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="medMorning" class="rounded" /> Morning (8:00 AM)</label>
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="medAfternoon" class="rounded" /> Afternoon (1:00 PM)</label>
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="medEvening" class="rounded" /> Evening (7:00 PM)</label>
        </div>
        <div class="flex gap-2">
          <button onclick="addMed()" class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold py-2 rounded-xl text-sm">Save</button>
          <button onclick="hideForm('medForm')" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl text-sm">Cancel</button>
        </div>
      </div>
      <div id="medList" class="space-y-2"><p class="text-gray-400 text-sm">Loading…</p></div>
    </div>

    <!-- Grocery tab -->
    <div id="panel-grocery" class="hidden">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-gray-800">Grocery Expiry Alerts</h2>
        <button onclick="showForm('grocForm')" class="text-sm bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold px-3 py-1 rounded-lg">+ Add</button>
      </div>
      <div id="grocForm" class="hidden bg-white rounded-2xl shadow p-4 mb-3 space-y-3">
        <input id="grocName" placeholder="Item name (e.g. Milk)" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        <input id="grocQty" placeholder="Quantity (optional)" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Expiry date</label>
          <input id="grocExpiry" type="date" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        </div>
        <div class="flex gap-2">
          <button onclick="addGroc()" class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold py-2 rounded-xl text-sm">Save</button>
          <button onclick="hideForm('grocForm')" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-xl text-sm">Cancel</button>
        </div>
      </div>
      <div id="grocList" class="space-y-2"><p class="text-gray-400 text-sm">Loading…</p></div>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://egbcgwqhwubiasiuxekr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnYmNnd3Fod3ViaWFzaXV4ZWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NTIyODEsImV4cCI6MjEwMDAyODI4MX0.xJvEwVos8hl_AZr7X9tn8hMxqhqSsQE9OI-7QRokKx0'
    );

    let uid, activeTab = 'bills';

    function switchTab(tab) {
      ['bills','medicine','grocery'].forEach(t => {
        document.getElementById('panel-'+t).classList.toggle('hidden', t !== tab);
        document.getElementById('tab-'+t).className = 'px-4 py-2 rounded-xl text-sm ' + (t===tab ? 'tab-active' : 'tab-inactive');
      });
      activeTab = tab;
    }

    function showForm(id) { document.getElementById(id).classList.toggle('hidden'); }
    function hideForm(id) { document.getElementById(id).classList.add('hidden'); }

    function daysUntil(dateStr) {
      if (!dateStr) return null;
      const diff = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
      return diff;
    }

    function dueBadge(days) {
      if (days === null) return '';
      if (days < 0) return '<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">Overdue</span>';
      if (days === 0) return '<span class="text-xs bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full">Today</span>';
      if (days <= 3) return `<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">In ${days}d</span>`;
      return `<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">${days}d left</span>`;
    }

    async function addBill() {
      const name = document.getElementById('billName').value.trim();
      const amount = parseFloat(document.getElementById('billAmount').value) || 0;
      const dueDate = document.getElementById('billDue').value;
      if (!name) return;
      await sb.from('expense_reminders').insert({ user_id: uid, data: { name, amount, dueDate } });
      hideForm('billForm');
      document.getElementById('billName').value = '';
      document.getElementById('billAmount').value = '';
      document.getElementById('billDue').value = '';
      loadBills();
    }

    async function deleteBill(id) {
      if (!confirm('Delete this reminder?')) return;
      await sb.from('expense_reminders').delete().eq('id', id).eq('user_id', uid);
      loadBills();
    }

    async function addMed() {
      const name = document.getElementById('medName').value.trim();
      const startDate = document.getElementById('medStart').value;
      const endDate = document.getElementById('medEnd').value || null;
      const times = {
        morning: document.getElementById('medMorning').checked,
        afternoon: document.getElementById('medAfternoon').checked,
        evening: document.getElementById('medEvening').checked,
      };
      if (!name) return;
      await sb.from('med_reminders').insert({ user_id: uid, data: { name, startDate, endDate, times } });
      hideForm('medForm');
      document.getElementById('medName').value = '';
      loadMeds();
    }

    async function deleteMed(id) {
      if (!confirm('Delete this reminder?')) return;
      await sb.from('med_reminders').delete().eq('id', id).eq('user_id', uid);
      loadMeds();
    }

    async function addGroc() {
      const name = document.getElementById('grocName').value.trim();
      const quantity = document.getElementById('grocQty').value.trim();
      const expiryDate = document.getElementById('grocExpiry').value;
      if (!name) return;
      await sb.from('grocery_reminders').insert({ user_id: uid, data: { name, quantity, expiryDate } });
      hideForm('grocForm');
      document.getElementById('grocName').value = '';
      document.getElementById('grocQty').value = '';
      document.getElementById('grocExpiry').value = '';
      loadGroc();
    }

    async function deleteGroc(id) {
      if (!confirm('Delete this reminder?')) return;
      await sb.from('grocery_reminders').delete().eq('id', id).eq('user_id', uid);
      loadGroc();
    }

    async function loadBills() {
      const { data } = await sb.from('expense_reminders').select('id, data').eq('user_id', uid).order('created_at', { ascending: false });
      const el = document.getElementById('billList');
      const rows = (data || []).map(r => ({ id: r.id, ...r.data }));
      if (!rows.length) { el.innerHTML = '<p class="text-gray-400 text-sm">No bill reminders yet.</p>'; return; }
      el.innerHTML = rows.map(r => `
        <div class="bg-white rounded-2xl shadow px-4 py-3 flex items-center gap-3">
          <span class="text-2xl">💳</span>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-gray-800 text-sm">${r.name}</p>
            <p class="text-gray-400 text-xs">${r.dueDate ? 'Due: '+r.dueDate : 'No due date'}</p>
          </div>
          <div class="flex flex-col items-end gap-1">
            ${r.amount ? `<p class="font-bold text-sm text-gray-800">$${Number(r.amount).toFixed(2)}</p>` : ''}
            ${dueBadge(daysUntil(r.dueDate))}
          </div>
          <button onclick="deleteBill('${r.id}')" class="text-gray-300 hover:text-red-400 text-lg ml-1">×</button>
        </div>
      `).join('');
    }

    async function loadMeds() {
      const { data } = await sb.from('med_reminders').select('id, data').eq('user_id', uid).order('created_at', { ascending: false });
      const el = document.getElementById('medList');
      const rows = (data || []).map(r => ({ id: r.id, ...r.data }));
      if (!rows.length) { el.innerHTML = '<p class="text-gray-400 text-sm">No medicine reminders yet.</p>'; return; }
      el.innerHTML = rows.map(r => {
        const times = r.times || {};
        const schedule = ['morning','afternoon','evening'].filter(t => times[t]).join(', ') || 'No times set';
        const days = daysUntil(r.endDate);
        return `
        <div class="bg-white rounded-2xl shadow px-4 py-3 flex items-center gap-3">
          <span class="text-2xl">💊</span>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-gray-800 text-sm">${r.name}</p>
            <p class="text-gray-400 text-xs capitalize">${schedule}</p>
            ${r.endDate ? `<p class="text-gray-400 text-xs">Until ${r.endDate}</p>` : '<p class="text-gray-400 text-xs">Ongoing</p>'}
          </div>
          ${r.endDate ? dueBadge(days) : '<span class="text-xs bg-green-100 text-green-600 px-2 py-0.5 rounded-full">Active</span>'}
          <button onclick="deleteMed('${r.id}')" class="text-gray-300 hover:text-red-400 text-lg ml-1">×</button>
        </div>`;
      }).join('');
    }

    async function loadGroc() {
      const { data } = await sb.from('grocery_reminders').select('id, data').eq('user_id', uid).order('created_at', { ascending: false });
      const el = document.getElementById('grocList');
      const rows = (data || []).map(r => ({ id: r.id, ...r.data }));
      if (!rows.length) { el.innerHTML = '<p class="text-gray-400 text-sm">No grocery reminders yet.</p>'; return; }
      el.innerHTML = rows.map(r => `
        <div class="bg-white rounded-2xl shadow px-4 py-3 flex items-center gap-3">
          <span class="text-2xl">🥦</span>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-gray-800 text-sm">${r.name}${r.quantity ? ' · ' + r.quantity : ''}</p>
            <p class="text-gray-400 text-xs">${r.expiryDate ? 'Expires: '+r.expiryDate : 'No expiry set'}</p>
          </div>
          ${dueBadge(daysUntil(r.expiryDate))}
          <button onclick="deleteGroc('${r.id}')" class="text-gray-300 hover:text-red-400 text-lg ml-1">×</button>
        </div>
      `).join('');
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      uid = session.user.id;
      loadBills(); loadMeds(); loadGroc();
    }

    init();
  </script>
</body>
</html>
