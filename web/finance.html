<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker — Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">

  <!-- Header -->
  <div class="bg-yellow-400 px-6 pt-8 pb-5 flex items-center gap-3">
    <a href="dashboard.html" class="text-gray-800 text-xl">‹</a>
    <h1 class="text-xl font-extrabold text-gray-900 flex-1">Finance</h1>
  </div>

  <!-- Balance banner -->
  <div class="bg-yellow-400 px-6 pb-6">
    <p class="text-xs text-gray-700 uppercase font-semibold tracking-wide">Total Balance</p>
    <p id="totalBalance" class="text-4xl font-extrabold text-gray-900 mt-1">—</p>
    <div class="flex gap-6 mt-3">
      <div><p id="monthIncome" class="font-bold text-green-700 text-sm">—</p><p class="text-gray-700 text-xs">Income this month</p></div>
      <div><p id="monthExpense" class="font-bold text-red-700 text-sm">—</p><p class="text-gray-700 text-xs">Expense this month</p></div>
    </div>
  </div>

  <div class="p-4 max-w-lg mx-auto space-y-6">

    <!-- Accounts -->
    <section>
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-gray-800">Accounts</h2>
        <button onclick="showAddAccount()" class="text-sm bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold px-3 py-1 rounded-lg">+ Add</button>
      </div>

      <!-- Add account form -->
      <div id="addAccountForm" class="hidden bg-white rounded-2xl shadow p-4 mb-3 space-y-3">
        <input id="accName" placeholder="Account name (e.g. Savings)" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        <select id="accType" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
          <option value="checking">Checking</option>
          <option value="savings">Savings</option>
          <option value="cash">Cash</option>
          <option value="credit">Credit Card</option>
          <option value="investment">Investment</option>
        </select>
        <input id="accBalance" type="number" step="0.01" placeholder="Opening balance" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        <div class="flex gap-2">
          <button onclick="addAccount()" class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold py-2 rounded-xl text-sm">Save</button>
          <button onclick="document.getElementById('addAccountForm').classList.add('hidden')" class="flex-1 bg-gray-100 text-gray-600 font-semibold py-2 rounded-xl text-sm">Cancel</button>
        </div>
      </div>

      <div id="accountsList" class="space-y-2">
        <p class="text-gray-400 text-sm">Loading…</p>
      </div>
    </section>

    <!-- Transactions -->
    <section>
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-gray-800">Transactions</h2>
        <button onclick="showAddTx()" class="text-sm bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold px-3 py-1 rounded-lg">+ Add</button>
      </div>

      <!-- Add transaction form -->
      <div id="addTxForm" class="hidden bg-white rounded-2xl shadow p-4 mb-3 space-y-3">
        <div class="flex gap-2">
          <button id="typeIncome" onclick="setTxType('income')" class="flex-1 py-2 rounded-xl text-sm font-semibold border-2 border-green-400 text-green-700">Income</button>
          <button id="typeExpense" onclick="setTxType('expense')" class="flex-1 py-2 rounded-xl text-sm font-semibold bg-red-500 text-white border-2 border-red-500">Expense</button>
        </div>
        <input id="txAmount" type="number" step="0.01" placeholder="Amount" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        <input id="txNote" placeholder="Note (optional)" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        <input id="txDate" type="date" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
        <select id="txAccount" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400">
          <option value="">Select account</option>
        </select>
        <div class="flex gap-2">
          <button onclick="addTransaction()" class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold py-2 rounded-xl text-sm">Save</button>
          <button onclick="document.getElementById('addTxForm').classList.add('hidden')" class="flex-1 bg-gray-100 text-gray-600 font-semibold py-2 rounded-xl text-sm">Cancel</button>
        </div>
      </div>

      <div id="txList" class="space-y-2">
        <p class="text-gray-400 text-sm">Loading…</p>
      </div>
    </section>
  </div>

  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://egbcgwqhwubiasiuxekr.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnYmNnd3Fod3ViaWFzaXV4ZWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NTIyODEsImV4cCI6MjEwMDAyODI4MX0.xJvEwVos8hl_AZr7X9tn8hMxqhqSsQE9OI-7QRokKx0'
    );

    let uid, accounts = [], txType = 'expense';

    function fmt(n) { return Number(n||0).toLocaleString('en-US',{style:'currency',currency:'USD'}); }

    function setTxType(t) {
      txType = t;
      document.getElementById('typeIncome').className = t === 'income'
        ? 'flex-1 py-2 rounded-xl text-sm font-semibold bg-green-500 text-white border-2 border-green-500'
        : 'flex-1 py-2 rounded-xl text-sm font-semibold border-2 border-green-400 text-green-700';
      document.getElementById('typeExpense').className = t === 'expense'
        ? 'flex-1 py-2 rounded-xl text-sm font-semibold bg-red-500 text-white border-2 border-red-500'
        : 'flex-1 py-2 rounded-xl text-sm font-semibold border-2 border-red-400 text-red-700';
    }

    function showAddAccount() {
      document.getElementById('addAccountForm').classList.toggle('hidden');
    }

    function showAddTx() {
      document.getElementById('addTxForm').classList.toggle('hidden');
      document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
      // populate account select
      const sel = document.getElementById('txAccount');
      sel.innerHTML = '<option value="">Select account</option>';
      accounts.forEach(a => { const o = document.createElement('option'); o.value = a.id; o.textContent = a.name; sel.appendChild(o); });
    }

    async function addAccount() {
      const name = document.getElementById('accName').value.trim();
      const type = document.getElementById('accType').value;
      const balance = parseFloat(document.getElementById('accBalance').value) || 0;
      if (!name) return;
      await sb.from('accounts').insert({ user_id: uid, name, type, balance });
      document.getElementById('addAccountForm').classList.add('hidden');
      document.getElementById('accName').value = '';
      document.getElementById('accBalance').value = '';
      loadData();
    }

    async function deleteAccount(id) {
      if (!confirm('Delete this account?')) return;
      await sb.from('accounts').delete().eq('id', id).eq('user_id', uid);
      loadData();
    }

    async function addTransaction() {
      const amount = parseFloat(document.getElementById('txAmount').value);
      const note = document.getElementById('txNote').value.trim();
      const date = document.getElementById('txDate').value;
      const account_id = document.getElementById('txAccount').value || null;
      if (!amount || !date) return;
      await sb.from('transactions').insert({ user_id: uid, amount, type: txType, note, date, account_id });
      document.getElementById('addTxForm').classList.add('hidden');
      document.getElementById('txAmount').value = '';
      document.getElementById('txNote').value = '';
      loadData();
    }

    async function deleteTx(id) {
      if (!confirm('Delete this transaction?')) return;
      await sb.from('transactions').delete().eq('id', id).eq('user_id', uid);
      loadData();
    }

    function renderAccounts(list) {
      const el = document.getElementById('accountsList');
      if (!list.length) { el.innerHTML = '<p class="text-gray-400 text-sm">No accounts yet.</p>'; return; }
      const typeIcon = {checking:'🏦',savings:'💰',cash:'💵',credit:'💳',investment:'📈'};
      el.innerHTML = list.map(a => `
        <div class="bg-white rounded-2xl shadow p-4 flex items-center gap-3">
          <span class="text-2xl">${typeIcon[a.type]||'🏦'}</span>
          <div class="flex-1">
            <p class="font-semibold text-gray-800 text-sm">${a.name}</p>
            <p class="text-gray-400 text-xs capitalize">${a.type}</p>
          </div>
          <p class="font-bold text-gray-900 text-sm">${fmt(a.balance)}</p>
          <button onclick="deleteAccount('${a.id}')" class="text-gray-300 hover:text-red-400 ml-2 text-lg">×</button>
        </div>
      `).join('');
    }

    function renderTransactions(list) {
      const el = document.getElementById('txList');
      if (!list.length) { el.innerHTML = '<p class="text-gray-400 text-sm">No transactions yet.</p>'; return; }
      el.innerHTML = list.slice(0,50).map(t => `
        <div class="bg-white rounded-2xl shadow px-4 py-3 flex items-center gap-3">
          <span class="text-xl">${t.type === 'income' ? '⬆️' : '⬇️'}</span>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-gray-800 text-sm truncate">${t.note || (t.type === 'income' ? 'Income' : 'Expense')}</p>
            <p class="text-gray-400 text-xs">${t.date}</p>
          </div>
          <p class="font-bold text-sm ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</p>
          <button onclick="deleteTx('${t.id}')" class="text-gray-300 hover:text-red-400 ml-2 text-lg">×</button>
        </div>
      `).join('');
    }

    async function loadData() {
      const now = new Date(); const y = now.getFullYear(), m = now.getMonth();
      const [{ data: accs }, { data: txs }] = await Promise.all([
        sb.from('accounts').select('*').eq('user_id', uid).order('created_at'),
        sb.from('transactions').select('*').eq('user_id', uid).order('date', { ascending: false }),
      ]);
      accounts = accs || [];
      const transactions = txs || [];
      const balance = accounts.reduce((s, a) => s + (a.balance || 0), 0);
      const monthTxs = transactions.filter(t => { const d = new Date(t.date); return d.getFullYear()===y && d.getMonth()===m; });
      const income = monthTxs.filter(t => t.type==='income').reduce((s,t) => s+(t.amount||0), 0);
      const expense = monthTxs.filter(t => t.type==='expense').reduce((s,t) => s+(t.amount||0), 0);
      document.getElementById('totalBalance').textContent = fmt(balance);
      document.getElementById('monthIncome').textContent = fmt(income);
      document.getElementById('monthExpense').textContent = fmt(expense);
      renderAccounts(accounts);
      renderTransactions(transactions);
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      uid = session.user.id;
      loadData();
    }

    init();
  </script>
</body>
</html>
